<script>
// ============================================
// CONFIG
// ============================================
const STEPS = [
    {id:'drawing', name:'Drawing', icon:'📐'},
    {id:'prepare', name:'Preparation', icon:'📦'},
    {id:'assembly', name:'Assembly', icon:'🔧'},
    {id:'wiring', name:'Wiring', icon:'🔌'},
    {id:'finishing', name:'Finishing', icon:'✨'},
    {id:'qc', name:'Quality Control', icon:'✅'}
];

let projects = [];
let currentProj = null;

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    load();
    render();
});

function startApp(){
    document.getElementById('splash').classList.add('hidden');
}

// ============================================
// STORAGE
// ============================================
function load(){
    try{
        const s = localStorage.getItem('ppm_clean');
        if(s) projects = JSON.parse(s);
    }catch{
        projects = [];
    }
}

function save(){
    localStorage.setItem('ppm_clean', JSON.stringify(projects));
}

// ============================================
// UI HELPERS
// ============================================
function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
}

function openModal(id){
    document.getElementById(id).classList.add('show');
}

function closeModal(id){
    document.getElementById(id).classList.remove('show');
}

// ============================================
// RENDER
// ============================================
function render(){
    renderTabs();

    if(projects.length === 0){
        empty.style.display='block';
        content.style.display='none';
        bot.style.display='none';
        return;
    }

    empty.style.display='none';
    content.style.display='block';
    bot.style.display='flex';

    if(!currentProj) currentProj = projects[0].id;

    const proj = projects.find(p => p.id === currentProj);
    updateProgress(proj);
    renderInfo(proj);
    renderProcs(proj);
}

function renderTabs(){
    let html = '';

    projects.forEach(p=>{
        html += `<button class="tab ${p.id===currentProj?'active':''}" onclick="switchProj('${p.id}')">${p.order}</button>`;
    });

    html += `<button class="tab add" onclick="openModal('newProjModal')">+</button>`;
    projTabs.innerHTML = html;
}

// ============================================
// PROJECT
// ============================================
function createProj(){
    const order = inpOrder.value.trim();
    if(!order) return showToast('Nomor order wajib');

    const proj = {
        id: 'p_'+Date.now(),
        order,
        customer: inpCust.value,
        steps:{}
    };

    STEPS.forEach(s=>{
        proj.steps[s.id] = {status:'pending',files:[],note:'',expanded:false};
    });

    projects.push(proj);
    currentProj = proj.id;

    save();
    render();
    closeModal('newProjModal');
}

function switchProj(id){
    currentProj = id;
    render();
}

// ============================================
// PROGRESS
// ============================================
function updateProgress(proj){
    const steps = Object.values(proj.steps);
    const done = steps.filter(s=>s.status==='done').length;
    const active = steps.filter(s=>s.status==='active').length;

    const pct = Math.round((done/STEPS.length)*100);

    pctVal.textContent = pct+'%';
    pctBar.style.width = pct+'%';

    sDone.textContent = done;
    sActive.textContent = active;
    sPending.textContent = STEPS.length-done-active;
}

// ============================================
// INFO
// ============================================
function renderInfo(proj){
    dispOrder.textContent = proj.order;
    dispCust.textContent = proj.customer || '-';
    dispPanel.textContent = '-';
}

// ============================================
// PROCESS LIST
// ============================================
function renderProcs(proj){
    let html = '';

    STEPS.forEach(proc=>{
        const step = proj.steps[proc.id];

        html += `
        <div class="item" data-status="${step.status}">
            <div class="item-h" onclick="toggle('${proc.id}')">
                <div class="icon">${proc.icon}</div>
                <div class="info">
                    <div class="name">${proc.name}</div>
                    <div class="meta">${step.files.length} file</div>
                </div>
                <div class="dot ${step.status}"></div>
            </div>
        `;

        if(step.expanded){
            html += `<div class="content"><div class="body">`;

            // FILE LIST
            step.files.forEach((f,i)=>{
                html += `
                <div class="fit">
                    <div class="thumb">${f.type.startsWith('image/') ? `<img src="${f.data}" onclick="viewImg('${f.data}')">` : '📎'}</div>
                    <div class="fi">
                        <div>${f.name}</div>
                    </div>
                    <button onclick="delFile('${proc.id}',${i})">❌</button>
                </div>`;
            });

            html += `
            <button onclick="triggerUpload('${proc.id}')">+ Upload</button>
            <input type="file" id="file-${proc.id}" style="display:none" onchange="handleFile('${proc.id}',this)">
            
            <textarea onchange="saveNote('${proc.id}',this.value)">${step.note||''}</textarea>

            <div class="st-wrap">
                <button onclick="setStatus('${proc.id}','pending')">Menunggu</button>
                <button onclick="setStatus('${proc.id}','active')">Aktif</button>
                <button onclick="setStatus('${proc.id}','done')">Selesai</button>
            </div>
            `;

            html += `</div></div>`;
        }

        html += `</div>`;
    });

    procList.innerHTML = html;
}

function toggle(id){
    const proj = projects.find(p=>p.id===currentProj);
    proj.steps[id].expanded = !proj.steps[id].expanded;
    save(); render();
}

// ============================================
// FILE
// ============================================
function triggerUpload(id){
    document.getElementById('file-'+id).click();
}

function handleFile(id,input){
    const file = input.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = e=>{
        const proj = projects.find(p=>p.id===currentProj);
        proj.steps[id].files.push({
            name:file.name,
            type:file.type,
            data:e.target.result
        });
        save(); render();
    };
    reader.readAsDataURL(file);
}

function delFile(id,i){
    const proj = projects.find(p=>p.id===currentProj);
    proj.steps[id].files.splice(i,1);
    save(); render();
}

// ============================================
// NOTE
// ============================================
function saveNote(id,val){
    const proj = projects.find(p=>p.id===currentProj);
    proj.steps[id].note = val;
    save();
}

// ============================================
// STATUS
// ============================================
function setStatus(id,status){
    const proj = projects.find(p=>p.id===currentProj);
    proj.steps[id].status = status;
    save(); render();
}

// ============================================
// VIEWER
// ============================================
function viewImg(src){
    viewImg.src = src;
    imgViewer.classList.add('show');
}

function closeViewer(){
    imgViewer.classList.remove('show');
}

// ============================================
// EXPORT
// ============================================
function exportJSON(){
    const proj = projects.find(p=>p.id===currentProj);
    const blob = new Blob([JSON.stringify(proj,null,2)]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = proj.order+'.json';
    a.click();
}

// ============================================
// PDF (SIMPLE)
// ============================================
function genPDF(){
    const proj = projects.find(p=>p.id===currentProj);
    const el = document.getElementById('pdf');

    let html = `<h1>${proj.order}</h1>`;

    Object.entries(proj.steps).forEach(([k,v])=>{
        html += `<p>${k} - ${v.status}</p>`;
    });

    el.innerHTML = html;
    el.style.display='block';

    html2pdf().from(el).save().then(()=>{
        el.style.display='none';
    });
}
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 Production Manager v12 - AUDITED & FIXED</title>
    
    <!-- Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* ==================== RESET & BASE ==================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-input: #1e1e1e;
            --border: #2a2a2a;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --text-muted: #777777;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --purple: #8b5cf6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-dark) !important;
            color: var(--text-white) !important;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ==================== LAYOUT ==================== */
        .app-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }
        
        /* SIDEBAR */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--bg-card);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .sidebar.hidden {
            transform: translateX(-260px);
        }
        
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 2px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }
        
        .logo {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 8px;
        }
        
        .app-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-white);
            letter-spacing: -0.3px;
        }
        
        .nav-menu {
            flex: 1 1 auto;
            padding: 16px 12px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 0 14px;
            margin-bottom: 10px;
        }
        
        .nav-item {
            display: block;
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 6px;
            background-color: transparent;
            border: 2px solid transparent;
            border-radius: 11px;
            color: var(--text-gray);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .nav-item:hover {
            background-color: rgba(59, 130, 246, 0.12);
            border-color: var(--blue);
            color: var(--text-white);
            transform: translateX(3px);
        }
        
        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.18);
            border-color: var(--blue);
            color: var(--blue);
            font-weight: 700;
        }
        
        .nav-icon {
            display: inline-block;
            width: 22px;
            text-align: center;
            margin-right: 10px;
            font-size: 1.25rem;
        }
        
        .nav-badge {
            float: right;
            background-color: var(--red);
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 800;
        }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 2px solid var(--border);
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        /* MAIN CONTENT */
        .main-content {
            flex: 1 1 0%;
            margin-left: 260px;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 0;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
        }
        
        .main-content.full-width {
            margin-left: 0 !important;
        }
        
        /* HEADER */
        .header {
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--border);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .menu-toggle-btn {
            width: 46px;
            height: 46px;
            background-color: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .menu-toggle-btn:hover {
            background-color: var(--blue);
            border-color: var(--blue);
            transform: scale(1.05);
        }
        
        .page-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-white);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-action-btn {
            width: 46px;
            height: 46px;
            background-color: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .header-action-btn:hover {
            background-color: var(--blue);
            border-color: var(--blue);
        }
        
        /* PAGES */
        .page {
            display: none;
            padding: 28px;
            animation: fadeIn 0.3s ease;
            flex: 1;
        }
        
        .page.active {
            display: block !important;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ==================== BUTTONS ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        
        .btn-secondary {
            background-color: var(--bg-input);
            color: var(--text-white);
            border: 2px solid var(--border);
        }
        
        .btn-sm {
            padding: 10px 18px;
            font-size: 0.85rem;
        }
        
        /* ==================== CARDS ==================== */
        .card {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-white);
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.25s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .stat-icon {
            font-size: 2.4rem;
            margin-bottom: 12px;
        }
        
        .stat-value {
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-white);
        }
        
        .stat-label {
            color: var(--text-gray);
            font-size: 0.88rem;
            margin-top: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* PROJECT LIST */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .project-item {
            background-color: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        
        .project-item:hover {
            border-color: var(--blue);
            background-color: rgba(59, 130, 246, 0.08);
            transform: translateX(6px);
        }
        
        .project-info {
            flex: 1;
            min-width: 0;
        }
        
        .project-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        
        .project-meta {
            font-size: 0.88rem;
            color: var(--text-gray);
        }
        
        .progress-ring {
            width: 76px;
            height: 76px;
            position: relative;
            flex-shrink: 0;
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }
        
        .progress-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 7;
        }
        
        .progress-fill {
            fill: none;
            stroke: var(--green);
            stroke-width: 7;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s ease;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            font-weight: 800;
        }
        
        /* PANEL DETAIL */
        .panel-detail-section {
            margin-top: 24px;
        }
        
        .panel-header {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), transparent);
            border: 2px solid var(--purple);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s ease;
            user-select: none;
        }
        
        .panel-header:hover {
            border-color: var(--blue);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), transparent);
        }
        
        .panel-header.expanded {
            border-bottom-left: 4px solid var(--purple);
        }
        
        .panel-icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .panel-info {
            flex: 1;
            min-width: 0;
        }
        
        .panel-name {
            font-size: 1.08rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        
        .panel-meta {
            font-size: 0.85rem;
            color: var(--text-gray);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .panel-progress-mini {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }
        
        .expand-icon {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }
        
        .panel-header.expanded .expand-icon {
            transform: rotate(180deg);
        }
        
        .panel-content {
            display: none;
            border: 2px solid var(--border);
            border-radius: 0 0 14px 14px;
            background-color: var(--bg-card);
            margin-top: 12px;
            animation: slideDown 0.3s ease;
        }
        
        .panel-content.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 2000px;
            }
        }
        
        .panel-body {
            padding: 20px;
        }
        
        /* STEPS GRID */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }
        
        .step-card {
            background-color: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
        }
        
        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: var(--border);
            transition: background-color 0.3s ease;
        }
        
        .step-card[data-status="active"]::before {
            background-color: var(--blue);
        }
        
        .step-card[data-status="done"]::before {
            background-color: var(--green);
        }
        
        .step-card:hover {
            border-color: var(--blue);
            transform: translateY(-3px);
        }
        
        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        .step-icon {
            font-size: 1.5rem;
        }
        
        .step-name {
            font-weight: 700;
            font-size: 0.95rem;
            flex: 1;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .status-pending {
            background-color: var(--text-muted);
        }
        
        .status-active {
            background-color: var(--blue);
            box-shadow: 0 0 10px var(--blue);
            animation: pulse 2s infinite;
        }
        
        .status-done {
            background-color: var(--green);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* STEP NOTE */
        .step-note-area {
            margin: 14px 0;
        }
        
        .step-note-label {
            font-size: 0.78rem;
            color: var(--text-gray);
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .step-note-textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 0.85rem;
            resize: vertical;
            min-height: 65px;
            font-family: inherit;
            line-height: 1.5;
            transition: border-color 0.2s;
        }
        
        .step-note-textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        /* FILES SECTION */
        .files-section {
            margin: 14px 0;
        }
        
        .files-count {
            font-size: 0.78rem;
            color: var(--text-gray);
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .files-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .file-item {
            width: 68px;
            height: 68px;
            border-radius: 10px;
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .file-item:hover {
            border-color: var(--blue);
            transform: scale(1.08);
            z-index: 10;
        }
        
        .file-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .file-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background-color: var(--bg-input);
        }
        
        .delete-file-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--red);
            color: white;
            border: none;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
            z-index: 20;
            transition: opacity 0.2s;
        }
        
        .file-item:hover .delete-file-btn {
            opacity: 1;
        }
        
        .delete-file-btn:hover {
            background-color: #dc2626;
            transform: scale(1.15);
        }
        
        .file-caption-input {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            font-size: 0.68rem;
            padding: 3px 6px;
            border: none;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .file-item:hover .file-caption-input {
            opacity: 1;
        }
        
        .add-file-btn {
            width: 68px;
            height: 68px;
            border-radius: 10px;
            border: 2px dashed var(--border);
            background-color: transparent;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .add-file-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
            background-color: rgba(59, 130, 246, 0.08);
        }
        
        /* STEP ACTIONS */
        .step-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        
        .step-action-btn {
            flex: 1;
            padding: 10px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-gray);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .step-action-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
            background-color: rgba(59, 130, 246, 0.1);
        }
        
        .step-action-btn.done-active {
            border-color: var(--green) !important;
            color: var(--green) !important;
            background-color: rgba(34, 197, 94, 0.12) !important;
        }
        
        /* MODAL OVERLAY */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.show {
            display: flex !important;
            animation: fadeIn 0.2s ease;
        }
        
        .modal {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 18px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 10000;
            position: relative;
        }
        
        .modal-header {
            padding: 22px 26px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-white);
        }
        
        .close-modal-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-input);
            color: var(--text-gray);
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .close-modal-btn:hover {
            background-color: var(--red);
            border-color: var(--red);
            color: white;
            transform: rotate(90deg);
        }
        
        .modal-body {
            padding: 26px;
        }
        
        .modal-footer {
            padding: 18px 26px;
            border-top: 2px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        /* FORM ELEMENTS */
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-label {
            display: block;
            font-size: 0.87rem;
            font-weight: 700;
            color: var(--text-gray);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 13px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-white);
            font-size: 0.92rem;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        textarea.form-input {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        /* TOAST NOTIFICATIONS */
        .toast-container {
            position: fixed;
            top: 90px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
        }
        
        .toast {
            background-color: var(--bg-card);
            border: 2px solid var(--border);
            border-left: 4px solid var(--blue);
            color: var(--text-white);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            animation: slideInRight 0.3s ease;
        }
        
        .toast.success {
            border-left-color: var(--green);
        }
        
        .toast.error {
            border-left-color: var(--red);
        }
        
        .toast.warning {
            border-left-color: var(--yellow);
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-gray);
        }
        
        .empty-state-icon {
            font-size: 4.5rem;
            margin-bottom: 16px;
            opacity: 0.45;
        }
        
        .empty-state-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-white);
            margin-bottom: 8px;
        }
        
        .empty-state-text {
            font-size: 0.95rem;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0 !important;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .steps-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                padding: 14px 16px;
            }
            
            .page {
                padding: 16px;
            }
            
            .stat-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">🏭</div>
            <div class="app-title">Production Manager</div>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-section">
                <div class="nav-section-title">Menu Utama</div>
                <button class="nav-item active" id="nav-dashboard" onclick="navigateTo('dashboard')">
                    <span class="nav-icon">📊</span> Dashboard
                </button>
                <button class="nav-item" id="nav-projects" onclick="navigateTo('projects')">
                    <span class="nav-icon">📋</span> Projects
                    <span class="nav-badge" id="badge-projects">0</span>
                </button>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            ⚡ Version 12.0 - Audited & Fixed
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" id="menuToggleBtn" aria-label="Toggle Menu">☰</button>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
            <div class="header-right">
                <button class="header-action-btn" id="settingsBtn" aria-label="Settings">⚙️</button>
            </div>
        </header>

        <!-- DASHBOARD PAGE -->
        <section class="page active" id="page-dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-value" id="stat-total-projects">0</div>
                    <div class="stat-label">Total Projects</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value" id="total-panels">0</div>
                    <div class="stat-label">Total Panels</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="completed-panels">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value" id="avg-progress">0%</div>
                    <div class="stat-label">Avg Progress</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">⚡ Quick Actions</span>
                </div>
                <div class="card-body">
                    <p style="color: var(--text-gray); margin-bottom: 18px; font-size: 0.95rem;">
                        Klik tombol di bawah untuk mulai menggunakan aplikasi:
                    </p>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="createSampleData()">
                            ➕ Create Sample Data
                        </button>
                        <button class="btn btn-secondary" onclick="clearAllData()">
                            🗑 Clear All Data
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PROJECTS PAGE -->
        <section class="page" id="page-projects">
            <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="openModal('newProjectModal')">+ New Project</button>
            </div>
            
            <div class="project-list" id="projectListContainer"></div>
            
            <div class="panel-detail-section" id="projectDetailArea"></div>
        </section>
    </main>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="newProjectModal">
    <div class="modal" role="dialog" aria-labelledby="newProjectModalTitle">
        <div class="modal-header">
            <h2 class="modal-title" id="newProjectModalTitle">➕ New Project</h2>
            <button class="close-modal-btn" onclick="closeModal('newProjectModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label" for="input-order-number">Order Number *</label>
                <input type="text" class="form-input" id="input-order-number" placeholder="Contoh: PO-2024-001" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="input-customer">Customer Name</label>
                <input type="text" class="form-input" id="input-customer" placeholder="Contoh: PT. Nama Perusahaan">
            </div>
            <div class="form-group">
                <label class="form-label" for="input-description">Description</label>
                <textarea class="form-input" id="input-description" rows="3" placeholder="Deskripsi project..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveNewProject()">Create Project</button>
        </div>
    </div>
</div>

<!-- IMAGE VIEWER MODAL -->
<div class="modal-overlay" id="imageViewerModal">
    <div class="modal" style="max-width: 90vw; max-height: 90vh;">
        <div class="modal-header">
            <h2 class="modal-title">Image Preview</h2>
            <button class="close-modal-btn" onclick="closeModal('imageViewerModal')">&times;</button>
        </div>
        <div class="modal-body" style="display: flex; justify-content: center; align-items: center; min-height: 300px;">
            <img id="viewerImage" src="" alt="Preview" style="max-width: 100%; max-height: 80vh; object-fit: contain;">
        </div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

<script>
// ==========================================
// CONSTANTS & CONFIGURATION
// ==========================================
const PROCESS_STEPS = [
    { id: 'drawing', name: 'Drawing / Gambar', icon: '📐' },
    { id: 'preparation', name: 'Preparation / Persiapan', icon: '📦' },
    { id: 'assembly', name: 'Assembly / Perakitan', icon: '🔧' },
    { id: 'wiring', name: 'Wiring / Kabel', icon: '🔌' },
    const id: 'finishing', name: 'Finishing / Finishing', icon: '✨' },
    { id: 'qc', name: 'Quality Control / QC', icon: '✅' }
];

const DB_NAME = 'ProdManagerDB_Fixed';
const DB_VERSION = 1;

// ==========================================
// APPLICATION STATE
// ==========================================
const AppState = {
    projects: [],
    currentProjectId: null,
    db: null,
    isInitialized: false
};

// ==========================================
// INITIALIZATION
// ==========================================
console.log('[INIT] Starting application...');

document.addEventListener('DOMContentLoaded', () => {
    console.log('[INIT] DOM Content Loaded');
    initializeApp();
});

function initializeApp() {
    try {
        initDatabase();
        setupEventListeners();
        AppState.isInitialized = true;
        console.log('[INIT] App initialized successfully');
    } catch (error) {
        console.error('[INIT] Initialization error:', error);
        showToast('Failed to initialize app!', 'error');
    }
}

function initDatabase() {
    console.log('[DB] Opening database...');
    
    if (!window.indexedDB) {
        console.error('[DB] IndexedDB not supported!');
        showToast('Your browser does not support this app', 'error');
        return;
    }
    
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    
    request.onerror = (event) => {
        console.error('[DB] Error opening database:', event.target.error);
        showToast('Database error! Please refresh.', 'error');
    };
    
    request.onsuccess = (event) => {
        AppState.db = event.target.result;
        console.log('[DB] Database connected successfully');
        loadProjectsFromDB(updateUI);
    };
    
    request.onupgradeneeded = (event) => {
        console.log('[DB] Upgrade needed...');
        const db = event.target.result;
        
        if (!db.objectStoreNames.contains('projects')) {
            db.createObjectStore('projects', { keyPath: 'id' });
            console.log('[DB] Created "projects" object store');
        }
    };
}

// ==========================================
// EVENT LISTENERS SETUP
// ==========================================
function setupEventListeners() {
    console.log('[EVENTS] Setting up event listeners...');
    
    // Menu toggle button
    const menuBtn = document.getElementById('menuToggleBtn');
    if (menuBtn) {
        menuBtn.addEventListener('click', toggleSidebar);
    }
    
    // Settings button
    const settingsBtn = document.getElementById('settingsBtn');
    if (settingsBtn) {
        settingsBtn.addEventListener('click', () => {
            showToast('Settings clicked', 'info');
        });
    }
    
    // Close modals when clicking outside
    document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal(modal.id);
            }
        });
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', handleKeyboard);
    
    console.log('[EVENTS] Event listeners ready');
}

function handleKeyboard(event) {
    if (event.key === 'Escape') {
        closeAllModals();
    }
}

// ==========================================
// NAVIGATION
// ==========================================
function navigateTo(pageName) {
    console.log(`[NAV] Navigating to: ${pageName}`);
    
    // Hide all pages
    const pages = document.querySelectorAll('.page');
    pages.forEach(page => {
        page.classList.remove('active');
    });
    
    // Show target page
    const targetPage = document.getElementById(`page-${pageName}`);
    if (targetPage) {
        targetPage.classList.add('active');
    }
    
    // Update nav items
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.classList.remove('active');
    });
    
    const activeNav = document.getElementById(`nav-${pageName}`);
    if (activeNav) {
        activeNav.classList.add('active');
    }
    
    // Update page title
    const titles = {
        dashboard: '📊 Dashboard',
        projects: '📋 Projects'
    };
    document.getElementById('pageTitle').textContent = titles[pageName] || pageName;
    
    // Page-specific actions
    switch (pageName) {
        case 'dashboard':
            updateDashboardStats();
            break;
        case 'projects':
            renderProjectsList();
            break;
    }
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    
    sidebar.classList.toggle('hidden');
    
    if (window.innerWidth <= 768) {
        sidebar.classList.toggle('open');
    } else {
        mainContent.classList.toggle('full-width');
    }
}

// ==========================================
// DATABASE OPERATIONS
// ==========================================
function saveProjectToDB(projectData, callback) {
    if (!AppState.db) {
        console.warn('[DB] No database connection');
        if (callback) callback(new Error('No database connection'));
        return;
    }
    
    try {
        const transaction = AppState.db.transaction(['projects'], 'readwrite');
        const store = transaction.objectStore('projects');
        const request = store.put(projectData);
        
        request.onsuccess = () => {
            console.log('[DB] Project saved:', projectData.id);
            if (callback) callback(null);
        };
        
        request.onerror = (event) => {
            console.error('[DB] Save error:', event.target.error);
            if (callback) callback(event.target.error);
        };
        
        transaction.oncomplete = () => {
            // Transaction complete
        };
        
    } catch (error) {
        console.error('[DB] Exception during save:', error);
        if (callback) callback(error);
    }
}

function getProjectsFromDB(callback) {
    if (!AppState.db) {
        if (callback) callback([]);
        return;
    }
    
    try {
        const transaction = AppState.db.transaction(['projects'], 'readonly');
        const store = transaction.objectStore('projects');
        const request = store.getAll();
        
        request.onsuccess = (event) => {
            const projects = event.target.result || [];
            console.log(`[DB] Loaded ${projects.length} projects`);
            if (callback) callback(null, projects);
        };
        
        request.onerror = (event) => {
            console.error('[DB] Get error:', event.target.error);
            if (callback) callback(event.target.error);
        };
        
    } catch (error) {
        console.error('[DB] Exception:', error);
        if (callback) callback(error);
    }
}

function deleteProjectFromDB(projectId, callback) {
    if (!AppState.db) {
        if (callback) callback(new Error('No database'));
        return;
    }
    
    try {
        const transaction = AppState.db.transaction(['projects'], 'readwrite');
        const store = transaction.objectStore('projects');
        store.delete(projectId);
        
        transaction.oncomplete = () => {
            console.log('[DB] Project deleted:', projectId);
            if (callback) callback(null);
        };
        
        transaction.onerror = (event) => {
            console.error('[DB] Delete error:', event.target.error);
            if (callback) callback(event.target.error);
        };
        
    } catch (error) {
        console.error('[DB] Exception:', error);
        if (callback) callback(error);
    }
}

function loadProjectsFromDB(callback) {
    getProjectsFromDB((err, projects) => {
        if (err) {
            console.error('[DATA] Load error:', err);
            AppState.projects = [];
        } else {
            AppState.projects = projects || [];
        }
        if (callback) callback();
    });
}

// ==========================================
// UI UPDATE FUNCTIONS
// ==========================================
function updateUI() {
    console.log('[UI] Updating UI...');
    
    try {
        updateDashboardStats();
        updateProjectBadge();
        renderProjectsList();
    } catch (error) {
        console.error('[UI] Update error:', error);
    }
}

function updateDashboardStats() {
    let totalProjects = AppState.projects.length;
    let totalPanels = 0;
    let completedPanels = 0;
    let sumProgress = 0;
    
    AppState.projects.forEach(project => {
        const panels = project.panels || [];
        totalPanels += panels.length;
        
        panels.forEach(panel => {
            const progress = calculatePanelProgress(panel);
            sumProgress += progress;
            if (progress === 100) completedPanels++;
        });
    });
    
    // Update stat values
    setElementText('stat-total-projects', totalProjects);
    setElementText('total-panels', totalPanels);
    setElementText('completed-panels', completedPanels);
    setElementText('avg-progress', totalPanels > 0 ? Math.round(sumProgress / totalPanels) + '%' : '0%');
    
    console.log(`[UI] Stats updated: ${totalProjects} projects, ${totalPanels} panels`);
}

function updateProjectBadge() {
    const badge = document.getElementById('badge-projects');
    if (badge) {
        badge.textContent = AppState.projects.length;
    }
}

function setElementText(elementId, text) {
    const element = document.getElementById(elementId);
    if (element) {
        element.textContent = text;
    }
}

// ==========================================
// PROJECT RENDERING
// ==========================================
function renderProjectsList() {
    const container = document.getElementById('projectListContainer');
    const detailArea = document.getElementById('projectDetailArea');
    
    if (!container) return;
    
    // Clear container
    container.innerHTML = '';
    
    if (!AppState.projects || AppState.projects.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <div class="empty-state-title">Belum Ada Project</div>
                <div class="empty-state-text">Klik "Create Sample Data" untuk memulai!</div>
            </div>
        `;
        return;
    }
    
    // Render each project
    AppState.projects.forEach((project, index) => {
        const progress = calculateProjectProgress(project);
        const panelCount = (project.panels || []).length;
        const circumference = 2 * Math.PI * 32;
        const offset = circumference - (progress / 100) * circumference;
        
        const projectItem = document.createElement('div');
        projectItem.className = 'project-item';
        projectItem.setAttribute('data-project-id', project.id);
        projectItem.onclick = () => selectProject(project.id);
        projectItem.innerHTML = `
            <div class="project-info">
                <div class="project-name">${escapeHTML(project.order)}</div>
                <div class="project-meta">${escapeHTML(project.customer || '-')} • ${panelCount} panels</div>
            </div>
            <div class="progress-ring">
                <svg width="76" height="76" viewBox="0 0 76 76">
                    <circle class="progress-bg" cx="38" cy="38" r="32"/>
                    <circle class="progress-fill" cx="38" cy="38" r="32"
                            style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset};"/>
                </svg>
                <div class="progress-text">${progress}%</div>
            </div>
        `;
        
        container.appendChild(projectItem);
    });
}

function selectProject(projectId) {
    console.log(`[PROJECT] Selected: ${projectId}`);
    AppState.currentProjectId = projectId;
    
    renderProjectDetail(projectId);
    
    // Scroll to detail area
    const detailArea = document.getElementById('projectDetailArea');
    if (detailArea) {
        detailArea.style.display = 'block';
        detailArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function renderProjectDetail(projectId) {
    const detailArea = document.getElementById('projectDetailArea');
    if (!detailArea) return;
    
    const project = AppState.projects.find(p => p.id === projectId);
    if (!project) {
        console.warn('[PROJECT] Project not found:', projectId);
        detailArea.style.display = 'none';
        return;
    }
    
    const progress = calculateProjectProgress(project);
    const panels = project.panels || [];
    
    let html = `
        <div class="card">
            <div class="card-header">
                <span class="card-title">📋 ${escapeHTML(project.order)} - ${escapeHTML(project.customer || '')}</span>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-sm btn-success" onclick="exportProjectPDF('${project.id}')">📄 Export PDF</button>
                    <button class="btn btn-sm btn-danger" onclick="confirmDeleteProject('${project.id}')">🗑 Delete</button>
                </div>
            </div>
            <div class="card-body">
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;text-align:center;">
                    <div style="background:var(--bg-input);padding:16px;border-radius:10px;">
                        <div style="font-size:1.5rem;font-weight:900;color:var(--purple);">${panels.length}</div>
                        <div style="font-size:0.8rem;color:var(--text-gray);margin-top:4px;">Panels</div>
                    </div>
                    <div style="background:var(--bg-input);padding:16px;border-radius:10px;">
                        <div style="font-size:1.5rem;font-weight:900;color:var(--green);">${panels.filter(p => calculatePanelProgress(p) === 100).length}</div>
                        <div style="font-size:0.8rem;color:var(--text-gray);margin-top:4px;">Done</div>
                    </div>
                    <div style="background:var(--bg-input);padding:16px;border-radius:10px;">
                        <div style="font-size:1.5rem;font-weight:900;color:var(--blue);">${panels.filter(p => {
                            const pr = calculatePanelProgress(p);
                            return pr > 0 && pr < 100;
                        }).length}</div>
                        <div style="font-size:0.8rem;color:var(--text-gray);margin-top:4px;">In Progress</div>
                    </div>
                    <div style="background:var(--bg-input);padding:16px;border-radius:10px;">
                        <div style="font-size:1.5rem;font-weight:900;">${progress}%</div>
                        <div style="font-size:0.8rem;color:var(--text-gray);margin-top:4px;">Overall</div>
                    </div>
                </div>
                
                <h3 style="margin:20px 0 16px 0;">📦 Panels Detail (klik untuk expand)</h3>
                <div class="panel-list" style="margin-top:16px;">
    `;
    
    // Render each panel
    panels.forEach((panel, index) => {
        const panelProgress = calculatePanelProgress(panel);
        const pCircumference = 2 * Math.PI * 24;
        const pOffset = pCircumference - (panelProgress / 100) * pCircumference;
        
        html += `
        <div class="panel-item" id="panel-${panel.id}">
            <div class="panel-header" onclick="togglePanel('${panel.id}')">
                <div class="panel-icon-wrapper">📦</div>
                <div class="panel-info">
                    <div class="panel-name">${escapeHTML(panel.name)}</div>
                    <div class="panel-meta">
                        <span>${escapeHTML(panel.spec || '-')}</span>
                        <span>Qty: ${panel.quantity}</span>
                    </div>
                </div>
                <div class="panel-progress-mini">
                    <div class="progress-ring" style="width:56px;height:56px;">
                        <svg width="56" height="56" viewBox="0 0 56 56">
                            <circle class="progress-bg" cx="28" cy="28" r="22"/>
                            <circle class="progress-fill" cx="28" cy="28" r="22"
                                    style="stroke-dasharray:${pCircumference};stroke-dashoffset:${pOffset};"/>
                        </svg>
                        <div class="progress-text" style="font-size:0.8rem;">${panelProgress}%</div>
                    </div>
                </div>
                <div class="expand-icon">▼</div>
            </div>
            <div class="panel-content" id="content-${panel.id}">
                <div class="panel-body">
                    <div class="steps-grid">
                        ${renderStepsForPanel(project.id, panel)}
                    </div>
                </div>
            </div>
        </div>
        `;
    });
    
    html += `</div></div></div>`;
    detailArea.innerHTML = html;
}

function renderStepsForPanel(projectId, panel) {
    let html = '';
    
    PROCESS_STEPS.forEach(stepDef => {
        const step = panel.steps?.[stepDef.id] || { status: 'pending', files: [], note: '' };
        const fileCount = step.files?.length || 0;
        
        html += `
        <div class="step-card" data-status="${step.status}" id="step-${panel.id}-${stepDef.id}">
            <div class="step-header" onclick="toggleStepDetail('${panel.id}','${stepDef.id}')">
                <span class="step-icon">${stepDef.icon}</span>
                <span class="step-name">${stepDef.name}</span>
                <div class="status-indicator status-${step.status}"></div>
            </div>
            
            <!-- Note Section -->
            <div class="step-note-area">
                <div class="step-note-label">📝 Catatan Step</div>
                <textarea 
                    class="step-note-textarea" 
                    placeholder="Tambahkan catatan untuk step ini..."
                    onblur="saveStepNote('${projectId}', '${panel.id}', '${stepDef.id}', this.value)"
                >${escapeHTML(step.note)}</textarea>
            </div>
            
            <!-- Files Section -->
            <div class="files-section">
                <div class="files-count">📎 ${fileCount} file${fileCount !== 1 ? 's' : ''}</div>
                <div class="files-grid">
                    ${(step.files || []).slice(0, 6)).map(file => {
                        const isImage = file.type && file.type.startsWith('image/');
                        return `
                        <div class="file-item" title="${escapeHTML(file.caption || file.name)}">
                            ${isImage ? 
                                `<img src="${file.data}" alt="${escapeHTML(file.name)}" loading="lazy" onclick="viewImage('${file.data}')">` :
                                `<div class="file-placeholder" onclick="viewFileDetails('${projectId}','${panel.id}','${stepDef.id}','${file.id}')">${getFileIcon(file.type)}</div>`
                            }
                            <button 
                                class="delete-file-btn" 
                                onclick="event.stopPropagation(); deleteFile('${projectId}','${panel.id}','${stepDef.id}','${file.id}')"
                                title="Hapus file ini"
                            >×</button>
                            <input 
                                type="text" 
                                class="file-caption-input" 
                                value="${escapeHTML(file.caption || '')}"
                                placeholder="Keterangan..."
                                onclick="event.stopPropagation()"
                                onchange="saveFileCaption('${projectId}','${panel.id}','${stepDef.id}','${file.id}',this.value)"
                            >
                        </div>
                    `;
                    }).join('')}
                    
                    ${fileCount > 6 ? `<div class="file-item"><div class="file-placeholder">+${fileCount - 6}</div></div>` : ''}
                    
                    <div class="add-file-btn" onclick="triggerFileUpload('${projectId}','${panel.id}','${stepDef.id}')" title="Upload file/foto bukti">+</div>
                </div>
            </div>
            
            <!-- Actions -->
            <div class="step-actions">
                <button 
                    class="step-action-btn ${step.status === 'done' ? 'done-active' : ''}"
                    onclick="setStepStatus('${projectId}','${panel.id}','${stepDef.id}','done')"
                    ${fileCount === 0 ? 'title="Upload minimal 1 file dulu!"' : ''}
                >
                    ✅ Done
                </button>
                <button 
                    class="step-action-btn ${step.status === 'active' ? 'done-active' : ''}"
                    onclick="setStepStatus('${projectId}','${panel.id}','${stepDef.id}','active')"
                >
                    ▶ Active
                </button>
            </div>
            
            <!-- Hidden file input -->
            <input 
                type="file" 
                id="file-${panel.id}-${stepDef.id}" 
                style="display:none;"
                accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
                multiple
                onchange="handleFileUpload('${projectId}','${panel.id}','${stepDef.id}',this)"
            >
        </div>
    });
    
    return html;
}

// ==========================================
// PANEL TOGGLE
// ==========================================
function togglePanel(panelId) {
    const content = document.getElementById(`content-${panelId}`);
    const header = content?.previousElementSibling;
    
    if (content) {
        const isVisible = content.classList.contains('show');
        
        if (isVisible) {
            content.classList.remove('show');
            if (header) header.classList.remove('expanded');
        } else {
            content.classList.add('show');
            if (header) header.classList.add('expanded');
        }
    }
}

function toggleStepDetail(panelId, stepId) {
    const detailEl = document.getElementById(`detail-${panelId}-${stepId}`);
    if (detailEl) {
        detailEl.classList.toggle('show');
    }
}

// ==========================================
// STEP ACTIONS
// ==========================================
function saveStepNote(projectId, panelId, stepId, noteValue) {
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    
    if (panel && panel.steps && panel.steps[stepId]) {
        panel.steps[stepId].note = noteValue;
        saveProjectToDB(project, (err) => {
            if (err) {
                console.error('[ERROR] Failed to save note:', err);
                showToast('Gagal menyimpan catatan!', 'error');
                return;
            }
            showToast('Catatan tersimpan ✅', 'success');
        });
    }
}

function setStepStatus(projectId, panelId, stepId, newStatus) {
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    
    if (!panel || !panel.steps || !panel.steps[stepId]) {
        console.warn('[STEP] Panel or step not found');
        return;
    }
    
    // Validation: Need at least 1 file before marking as done
    if (newStatus === 'done') {
        const fileCount = panel.steps[stepId].files?.length || 0;
        if (fileCount === 0) {
            showToast('⚠️ Upload minimal 1 file sebelum mark Done!', 'warning');
            return;
        }
    }
    
    panel.steps[stepId].status = newStatus;
    
    saveProjectToDB(project, (err) => {
        if (err) {
            console.error('[ERROR] Failed to update status:', err);
            showToast('Gagal update status!', 'error');
            return;
        }
        
        // Re-render the specific panel
        renderProjectDetail(projectId);
        showToast(`Step "${newStatus}" berhasil diupdate! ✅`, 'success');
    });
}

// ==========================================
// FILE OPERATIONS
// ==========================================
function triggerFileUpload(projectId, panelId, stepId) {
    const input = document.getElementById(`file-${panelId}-${stepId}`);
    if (input) {
        input.value = ''; // Reset value
        input.click();
    }
}

function handleFileUpload(projectId, panelId, stepId, inputElement) {
    const files = Array.from(inputElement.files);
    if (!files.length) return;
    
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    
    if (!panel) {
        console.error('[FILE] Panel not found');
        showToast('Panel not found!', 'error');
        return;
    }
    
    let processed = 0;
    const totalFiles = files.length;
    
    showToast(`⏳ Mengupload ${totalFiles} file...`, 'info');
    
    files.forEach(file => {
        // Validate file size (max 10MB)
        if (file.size > 10 * 1024 * 1024) {
            showToast(`${file.name} terlalu besar! Max 10MB`, 'warning');
            processed++;
            if (processed === totalFiles) {
                finishUpload();
            }
            return;
        }
        
        const reader = new FileReader();
        
        reader.onload = (event) => {
            const fileData = {
                id: `f_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                name: file.name,
                type: file.type,
                size: file.size,
                data: event.target.result,
                caption: '',
                uploadedAt: new Date().toISOString()
            };
            
            // Initialize files array if not exists
            if (!panel.steps[stepId].files) {
                panel.steps[stepId].files = [];
            }
            
            panel.steps[stepId].files.push(fileData);
            processed++;
            
            if (processed === totalFiles) {
                finishUpload();
            }
        };
        
        reader.readAsDataURL(file);
    });
    
    function finishUpload() {
        saveProjectToDB(project, (err) => {
            if (err) {
                console.error('[FILE] Upload save error:', err);
                showToast('Gagal menyimpan file!', 'error');
                return;
            }
            
            // Re-render
            renderProjectDetail(projectId);
            showToast(`${processed} file berhasil diupload! ✅`, 'success');
        });
    }
}

function deleteFile(projectId, panelId, stepId, fileId) {
    if (!confirm('Yakin ingin menghapus file ini?')) return;
    
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    
    if (!panel || !panel.steps || !panel.steps[stepId]) {
        showToast('File not found!', 'error');
        return;
    }
    
    const originalLength = panel.steps[stepId].files?.length || 0;
    panel.steps[stepId].files = panel.steps[stepId].files.filter(f => f.id !== fileId);
    
    saveProjectToDB(project, (err) => {
        if (err) {
            console.error('[DELETE] Error:', err);
            return;
        }
        
        renderProjectDetail(projectId);
        showToast(`File dihapus! (${originalLength - 1} tersisa) 🗑️`, 'info');
    });
}

function saveFileCaption(projectId, panelId, stepId, fileId, captionValue) {
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    const file = panel?.steps?.[stepId]?.files?.find(f => f.id === fileId);
    
    if (file) {
        file.caption = captionValue;
        saveProjectToDB(project);
        showToast('💬 Caption tersimpan!', 'success');
    }
}

function viewImage(imageSrc) {
    const viewer = document.getElementById('viewerImage');
    const modal = document.getElementById('imageViewerModal');
    
    if (viewer) viewer.src = imageSrc;
    if (modal) openModal('imageViewerModal');
}

function viewFileDetails(projectId, panelId, stepId, fileId) {
    const project = AppState.projects.find(p => p.id === projectId);
    const panel = project?.panels?.find(p => p.id === panelId);
    const file = panel?.steps?.[stepId]?.files?.find(f => f.id === fileId);
    
    if (file) {
        alert(`
            📄 File Details
            
            Nama: ${file.name}
            Tipe: ${file.type || 'Unknown'}
            Ukuran: ${(file.size / 1024).toFixed(1)} KB
            Keterangan: ${file.caption || 'Tidak ada'}
            Diupload: ${new Date(file.uploadedAt).toLocaleString('id-ID')}
        `);
    }
}

function getFileIcon(mimeType) {
    if (!mimeType) return '📎';
    if (mimeType.includes('pdf')) return '📄';
    if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
    if (mimeType.includes('excel') || mimeType.includes('sheet') || mimeType.includes('csv')) return '📊';
    if (mimeType.startsWith('image/')) return '🖼️';
    return '📎';
}

// ==========================================
// TOAST NOTIFICATIONS
// ==========================================
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = message;
    toast.onclick = () => {
        toast.style.animation = 'slideOutRight 0.3s forwards';
        setTimeout(() => {
            if (toast.parentNode) {
                toast.remove();
            }
        }, 300);
    };
    
    container.appendChild(toast);
    
    setTimeout(() => {
        if (toast.parentNode) {
            toast.style.animation = 'slideOutRight 0.3s forwards';
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 300);
        }
    }, 4000);
}

// ==========================================
// PROGRESS CALCULATIONS
// ==========================================
function calculatePanelProgress(panel) {
    if (!panel || !panel.steps) return 0;
    
    const steps = Object.values(panel.steps);
    if (steps.length === 0) return 0;
    
    const doneSteps = steps.filter(step => step.status === 'done').length;
    return Math.round((doneSteps / steps.length) * 100);
}

function calculateProjectProgress(project) {
    if (!project || !project.panels || project.panels.length === 0) return 0;
    
    const totalProgress = project.panels.reduce((sum, panel) => sum + calculatePanelProgress(panel), 0);
    return Math.round(totalProgress / project.panels.length);
}

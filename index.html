<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="Panel Production Manager - Sistem manajemen produksi panel profesional">
    <meta name="author" content="Panel Production Manager">
    
    <title>🏭 Panel Production Manager</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #141414;
            --bg-surface-light: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-blue: #3b82f6;
            --accent-success: #22c55e;
            --accent-danger: #ef4444;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* SPLASH SCREEN */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo { font-size: 5rem; margin-bottom: 2rem; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .splash-title {
            font-size: 2rem; font-weight: 700; margin-bottom: 1rem;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .splash-subtitle { color: #888; font-size: 1rem; margin-bottom: 3rem; text-align: center; max-width: 300px; }

        .splash-btn {
            padding: 16px 48px; background: #3b82f6; color: white; border: none;
            border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(59,130,246,0.4);
        }

        .splash-btn:hover {
            transform: translateY(-2px); box-shadow: 0 14px 30px rgba(59,130,246,0.5);
        }

        /* APP CONTAINER */
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

        /* HEADER */
        .header {
            background: var(--bg-surface); border-bottom: 1px solid var(--border-color);
            padding: 20px; position: sticky; top: 0; z-index: 100;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        
        .header-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .header-actions { display: flex; gap: 10px; }

        .icon-btn {
            width: 40px; height: 40px; border-radius: 8px;
            background: var(--bg-surface-light); border: 1px solid var(--border-color);
            color: var(--text-primary); display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 1.1rem;
        }

        /* PROJECT TABS */
        .project-selector {
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none;
            padding: 4px 0;
        }

        .project-selector::-webkit-scrollbar { display: none; }

        .project-tab {
            flex-shrink: 0; padding: 10px 18px; background: var(--bg-surface-light);
            border: 1px solid var(--border-color); border-radius: 9999px;
            font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;
            white-space: nowrap; max-width: 160px; overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-tab.active {
            background: #3b82f6; border-color: #3b82f6; color: white;
        }

        .project-tab.add {
            background: transparent; border-style: dashed; width: 42px;
            padding: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }

        /* PROGRESS SECTION */
        .progress-section {
            background: var(--bg-surface); margin: 20px; border-radius: var(--radius-xl);
            padding: 24px; border: 1px solid var(--border-color);
        }

        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .progress-label { font-size: 0.9rem; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; }
        
        .progress-value { font-size: 2rem; font-weight: 800; color: #3b82f6; }

        .progress-bar-container {
            height: 10px; background: var(--bg-surface-light); border-radius: 9999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 9999px; transition: width 0.5s ease;
        }

        .progress-stats {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
            margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color);
        }

        .stat { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px; background: var(--bg-surface-light); border-radius: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .stat.done .stat-value { color: #22c55e; }
        .stat.active .stat-value { color: #3b82f6; }
        .stat.pending .stat-value { color: #555; }

        /* INFO CARD */
        .info-card {
            background: var(--bg-surface); margin: 0 20px 20px; border-radius: var(--radius-xl);
            padding: 20px 24px; border: 1px solid var(--border-color); cursor: pointer;
        }

        .info-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .info-item:last-child { border-bottom: none; }
        .info-key { font-size: 0.9rem; color: var(--text-secondary); }
        .info-value { font-size: 0.95rem; font-weight: 600; }

        /* SECTION TITLE */
        .section-title {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-secondary); margin: 28px 20px 16px;
        }

        /* PROCESS LIST */
        .process-list { padding: 0 20px; }

        .process-item {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-xl); margin-bottom: 16px; overflow: hidden;
        }

        .process-header {
            padding: 20px; display: flex; align-items: center; gap: 16px; cursor: pointer;
        }

        .process-icon {
            width: 48px; height: 48px; border-radius: 12px; background: var(--bg-surface-light);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        .process-item.active .process-icon { background: rgba(59,130,246,0.15); border: 2px solid #3b82f6; }
        .process-item.done .process-icon { background: rgba(34,197,94,0.15); border: 2px solid #22c55e; }

        .process-info { flex: 1; min-width: 0; }
        .process-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .process-meta { font-size: 0.8rem; color: var(--text-secondary); }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.pending { background: #555; }
        .status-dot.active { background: #3b82f6; box-shadow: 0 0 12px #3b82f6; animation: glow 2s infinite; }
        .status-dot.done { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* PROCESS CONTENT */
        .process-content { display: none; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border-color); }
        .process-item.expanded .process-content { display: block; }
        .process-body { padding: 24px; }

        /* FILES */
        .file-section { margin-bottom: 24px; }
        .file-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 14px; display: block; font-weight: 600; }
        .file-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }

        .file-item {
            display: flex; align-items: center; gap: 14px; padding: 14px;
            background: var(--bg-surface-light); border-radius: 12px; border: 1px solid var(--border-color);
        }

        .file-thumb {
            width: 52px; height: 52px; border-radius: 8px; background: var(--bg-surface);
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
        }

        .file-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .file-details { flex: 1; min-width: 0; }
        .file-name { font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 0.75rem; color: var(--text-secondary); }

        .file-actions { display: flex; gap: 8px; }
        .file-btn {
            width: 36px; height: 36px; border-radius: 8px; border: none;
            background: var(--bg-surface); color: var(--text-primary); cursor: pointer;
        }
        .file-btn.delete { color: #ef4444; }

        .upload-btn {
            width: 100%; padding: 16px; border: 2px dashed var(--border-color);
            border-radius: 12px; background: transparent; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .upload-btn:hover { border-color: #3b82f6; color: #3b82f6; }

        /* NOTES */
        .notes-section { margin-bottom: 24px; }
        .notes-input {
            width: 100%; padding: 14px; background: var(--bg-surface-light);
            border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary);
            font-size: 0.9rem; resize: vertical; min-height: 90px; font-family: inherit;
        }

        .notes-input:focus { outline: none; border-color: #3b82f6; }

        /* STATUS TOGGLE */
        .status-toggle { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .toggle-btn {
            padding: 14px 8px; border: 1px solid var(--border-color); border-radius: 12px;
            background: var(--bg-surface-light); color: var(--text-secondary);
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
        }
        .toggle-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        .toggle-btn.done { background: #22c55e; border-color: #22c55e; color: white; }

        /* BOTTOM ACTIONS */
        .bottom-actions {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-surface); border-top: 1px solid var(--border-color);
            padding: 16px 20px 28px; display: flex; gap: 12px; z-index: 100;
        }

        .btn {
            flex: 1; padding: 16px; border-radius: 12px; border: none;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-secondary { background: var(--bg-surface-light); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal-container {
            background: var(--bg-surface); border-radius: var(--radius-xl);
            width: 100%; max-width: 420px; border: 1px solid var(--border-color); overflow: hidden;
        }

        .modal-header {
            padding: 24px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        .modal-title { font-weight: 700; font-size: 1.2rem; }
        .modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 1.8rem; cursor: pointer; width: 36px; height: 36px;
        }

        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        .form-input {
            width: 100%; padding: 14px 16px; background: var(--bg-surface-light);
            border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary); font-size: 1rem;
        }

        .form-input:focus { outline: none; border-color: #3b82f6; }

        /* PROJECT LIST IN MODAL */
        .project-list-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px; background: var(--bg-surface-light); border-radius: 12px;
            margin-bottom: 10px; cursor: pointer; border: 2px solid var(--border-color);
        }

        .project-list-item.active { background: rgba(59,130,246,0.15); border-color: #3b82f6; }
        .project-info-small { flex: 1; min-width: 0; }
        .project-name-small { font-weight: 700; margin-bottom: 4px; }
        .project-meta-small { font-size: 0.8rem; color: var(--text-secondary); }

        .delete-project-btn {
            width: 38px; height: 38px; border-radius: 8px; border: none;
            background: #ef4444; color: white; cursor: pointer;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--bg-surface); color: var(--text-primary); padding: 14px 28px;
            border-radius: 12px; border: 1px solid var(--border-color); font-size: 0.9rem;
            opacity: 0; transition: all 0.3s ease; z-index: 300;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* IMAGE VIEWER */
        .image-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 250; align-items: center; justify-content: center;
        }

        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 12px; }
        .image-viewer-close {
            position: absolute; top: 24px; right: 24px; background: var(--bg-surface);
            border: 2px solid var(--border-color); color: white; width: 48px; height: 48px;
            border-radius: 50%; font-size: 1.8rem; cursor: pointer;
        }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 80px 24px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 5rem; margin-bottom: 24px; opacity: 0.4; }
        .empty-state-text { font-size: 1.2rem; margin-bottom: 32px; }

        .content-wrapper { padding-bottom: 120px; }

        #pdfContent { display: none; background: white; color: #000; padding: 50px; }
    </style>
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">🏭</div>
        <h1 class="splash-title">Panel Production Manager</h1>
        <p class="splash-subtitle">Sistem tracking produksi panel profesional</p>
        <button class="splash-btn" onclick="enterApp()">Mulai Sekarang →</button>
    </div>

    <!-- APP CONTAINER -->
    <div class="app-container" id="appContainer">
        <div class="content-wrapper" id="mainContent">
            <!-- HEADER -->
            <header class="header">
                <div class="header-top">
                    <h1 class="header-title">🏭 Production Manager</h1>
                    <div class="header-actions">
                        <button class="icon-btn" onclick="openProjectsModal()" title="Semua Proyek">☰</button>
                        <button class="icon-btn" onclick="openNewProjectModal()" title="Proyek Baru">+</button>
                    </div>
                </div>
                <nav class="project-selector" id="projectSelector"></nav>
            </header>

            <!-- EMPTY STATE -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-state-icon">📁</div>
                <p class="empty-state-text">Belum ada proyek</p>
                <button class="btn btn-primary" style="max-width:240px;margin:0 auto;" onclick="openNewProjectModal()">
                    + Buat Proyek Pertama
                </button>
            </div>

            <!-- PROJECT CONTENT -->
            <main id="projectContent">
                <!-- PROGRESS -->
                <section class="progress-section">
                    <div class="progress-header">
                        <span class="progress-label">Progress Keseluruhan</span>
                        <span class="progress-value" id="progressValue">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-fill" id="progressBar" style="width:0%"></div>
                    </div>
                    <div class="progress-stats">
                        <div class="stat done"><span class="stat-value" id="statDone">0</span><span class="stat-label">Selesai</span></div>
                        <div class="stat active"><span class="stat-value" id="statActive">0</span><span class="stat-label">Aktif</span></div>
                        <div class="stat pending"><span class="stat-value" id="statPending">6</span><span class="stat-label">Menunggu</span></div>
                    </div>
                </section>

                <!-- INFO CARD -->
                <article class="info-card" onclick="openEditProjectModal()">
                    <div class="info-item"><span class="info-key">Nomor Order</span><span class="info-value" id="dispOrder">-</span></div>
                    <div class="info-item"><span class="info-key">Pelanggan</span><span class="info-value" id="dispCustomer">-</span></div>
                    <div class="info-item"><span class="info-key">Nama Panel</span><span class="info-value" id="dispPanel">-</span></div>
                </article>

                <!-- PROCESSES -->
                <h2 class="section-title">Tahapan Produksi</h2>
                <div class="process-list" id="processList"></div>
            </main>
        </div>

        <!-- BOTTOM ACTIONS -->
        <footer class="bottom-actions" id="bottomActions" style="display:none;">
            <button class="btn btn-secondary" onclick="exportProject()">📥 Export JSON</button>
            <button class="btn btn-primary" onclick="generatePDF()">📄 Laporan PDF</button>
        </footer>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="newProjectModal" onclick="closeNewProjectModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">Proyek Baru</h2>
                <button class="modal-close" onclick="closeNewProjectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Nomor Order *</label>
                    <input type="text" class="form-input" id="newOrder" placeholder="PO-2024-001">
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Pelanggan</label>
                    <input type="text" class="form-input" id="newCustomer" placeholder="Nama pelanggan">
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Panel</label>
                    <input type="text" class="form-input" id="newPanel" placeholder="Panel MDP 1600A">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="createProject()">✨ Buat Proyek</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editProjectModal" onclick="closeEditProjectModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">Edit Proyek</h2>
                <button class="modal-close" onclick="closeEditProjectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Nomor Order</label>
                    <input type="text" class="form-input" id="editOrder">
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Pelanggan</label>
                    <input type="text" class="form-input" id="editCustomer">
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Panel</label>
                    <input type="text" class="form-input" id="editPanel">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="saveEditProject()">💾 Simpan</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="projectsModal" onclick="closeProjectsModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">Semua Proyek</h2>
                <button class="modal-close" onclick="closeProjectsModal()">&times;</button>
            </div>
            <div class="modal-body" id="projectsList"></div>
        </div>
    </div>

    <!-- IMAGE VIEWER -->
    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <button class="image-viewer-close" onclick="closeImageViewer()">&times;</button>
        <img id="viewerImage" src="" alt="">
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- PDF TEMPLATE -->
    <div id="pdfContent">
        <h1 style="text-align:center;margin-bottom:40px;">Laporan Progress Produksi</h1>
        <div id="pdfBody"></div>
    </div>

    <script>
        const PROCESSES = [
            { id:'drawing', name:'Drawing', icon:'📐', desc:'Gambar teknis' },
            { id:'prepare', name:'Preparation', icon:'📦', desc:'Persiapan komponen' },
            { id:'assembly', name:'Assembly', icon:'🔧', desc:'Perakitan panel' },
            { id:'wiring', name:'Wiring', icon:'🔌', desc:'Pemasangan kabel' },
            { id:'finishing', name:'Finishing', icon:'✨', desc:'Finishing akhir' },
            { id:'qc', name:'Quality Control', icon:'✓', desc:'Pengendalian mutu' }
        ];

        let projects = [];
        let currentProjectId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            if(localStorage.getItem('ppm_visited')) enterApp();
        });

        function enterApp() {
            document.getElementById('splashScreen').classList.add('hidden');
            localStorage.setItem('ppm_visited','true');
            render();
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('ppm_data');
                if(saved) projects = JSON.parse(saved);
            } catch(e) { projects = []; }
        }

        function saveData() {
            try {
                localStorage.setItem('ppm_data', JSON.stringify(projects));
            } catch(e) { showToast('Gagal simpan data'); }
        }

        function createNewProject(order, customer, panel) {
            const project = {
                id: 'proj_'+Date.now(),
                order: order || 'Proyek Baru',
                customer: customer || '',
                panel: panel || '',
                createdAt: new Date().toISOString(),
                steps: {}
            };
            PROCESSES.forEach(p => {
                project.steps[p.id] = { status:'pending', files:[], note:'', expanded:false };
            });
            return project;
        }

        function render() {
            renderProjectSelector();
            
            if(projects.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('projectContent').style.display = 'none';
                document.getElementById('bottomActions').style.display = 'none';
            } else {
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('projectContent').style.display = 'block';
                document.getElementById('bottomActions').style.display = 'flex';
                
                const project = projects.find(p => p.id === currentProjectId) || projects[0];
                if(!currentProjectId || !projects.find(p => p.id === currentProjectId)) {
                    currentProjectId = project.id;
                }
                renderProject(project);
            }
        }

        function renderProjectSelector() {
            const selector = document.getElementById('projectSelector');
            selector.innerHTML = projects.map(p => `
                <button class="project-tab ${p.id===currentProjectId?'active':''}" 
                        onclick="switchProject('${p.id}')">${p.order}</button>
            `).join('') + `<button class="project-tab add" onclick="openNewProjectModal()">+</button>`;
        }

        function renderProject(project) {
            document.getElementById('dispOrder').textContent = project.order || '-';
            document.getElementById('dispCustomer').textContent = project.customer || '-';
            document.getElementById('dispPanel').textContent = project.panel || '-';

            const steps = Object.values(project.steps);
            const done = steps.filter(s=>s.status==='done').length;
            const active = steps.filter(s=>s.status==='active').length;
            const total = PROCESSES.length;
            const pct = Math.round((done/total)*100);

            document.getElementById('progressValue').textContent = pct+'%';
            document.getElementById('progressBar').style.width = pct+'%';
            document.getElementById('statDone').textContent = done;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statPending').textContent = total-done-active;

            document.getElementById('processList').innerHTML = PROCESSES.map(p => {
                const step = project.steps[p.id];
                return `
                <article class="process-item ${step.status} ${step.expanded?'expanded':''}" id="proc-${p.id}">
                    <div class="process-header" onclick="toggleExpand('${p.id}')">
                        <div class="process-icon">${p.icon}</div>
                        <div class="process-info">
                            <div class="process-name">${p.name}</div>
                            <div class="process-meta">${step.files.length} file${step.note?' • Catatan':''}</div>
                        </div>
                        <div class="status-dot ${step.status}"></div>
                    </div>
                    ${step.expanded?`
                    <div class="process-content">
                        <div class="process-body">
                            ${renderFiles(project.id,p.id)}
                            <div class="file-section">
                                <label class="file-label">Tambah File</label>
                                <button class="upload-btn" onclick="triggerUpload('${p.id}')">+ Pilih File</button>
                                <input type="file" id="file-${p.id}" style="display:none" accept="image/*,.pdf,.doc,.docx" onchange="handleFile('${p.id}',this)">
                            </div>
                            <div class="notes-section">
                                <label class="file-label">Catatan</label>
                                <textarea class="notes-input" placeholder="Catatan..." onchange="saveNote('${p.id}',this.value)">${step.note}</textarea>
                            </div>
                            <div class="status-toggle">
                                <button class="toggle-btn ${step.status==='pending'?'active':''}" onclick="setStatus('${p.id}','pending')">Menunggu</button>
                                <button class="toggle-btn ${step.status==='active'?'active':''}" onclick="setStatus('${p.id}','active')">Aktif</button>
                                <button class="toggle-btn ${step.status==='done'?'done':''}" onclick="setStatus('${p.id}','done')">Selesai</button>
                            </div>
                        </div>
                    </div>
                    `:''}
                </article>`;
            }).join('');
        }

        function renderFiles(pid, procId) {
            const proj = projects.find(p=>p.id===pid);
            const files = proj.steps[procId].files;
            if(!files.length) return '';
            return `
            <div class="file-section">
                <label class="file-label">File (${files.length})</label>
                <div class="file-list">
                    ${files.map((f,i)=>`
                    <div class="file-item">
                        <div class="file-thumb">${f.type.startsWith('image/')?`<img src="${f.data}" onclick="viewImage('${f.data}')">`:getFileIcon(f.type)}</div>
                        <div class="file-details">
                            <div class="file-name">${f.name}</div>
                            <div class="file-size">${formatSize(f.size)}</div>
                        </div>
                        <div class="file-actions">
                            ${f.type==='application/pdf'?`<button class="file-btn" onclick="viewPdf('${f.data}')">👁</button>`:''}
                            <button class="file-btn delete" onclick="deleteFile('${procId}',${i})">×</button>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function getFileIcon(t) {
            if(t==='application/pdf') return '📄';
            if(t.includes('word')) return '📝';
            if(t.includes('excel')||t.includes('sheet')) return '📊';
            return '📎';
        }

        function formatSize(b) {
            if(b<1024) return b+' B';
            if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
            return (b/(1024*1024)).toFixed(1)+' MB';
        }

        function switchProject(id) {
            currentProjectId = id;
            render();
            showToast('✅ Proyek diganti');
        }

        function createProject() {
            const order = document.getElementById('newOrder').value.trim();
            if(!order) { showToast('⚠️ Order wajib!'); return; }
            
            const proj = createNewProject(order, document.getElementById('newCustomer').value.trim(), document.getElementById('newPanel').value.trim());
            projects.push(proj);
            currentProjectId = proj.id;
            saveData();
            render();
            closeNewProjectModal();
            
            document.getElementById('newOrder').value = '';
            document.getElementById('newCustomer').value = '';
            document.getElementById('newPanel').value = '';
            showToast('✅ Proyek dibuat!');
        }

        function deleteProject(id, e) {
            e.stopPropagation();
            if(!confirm('Hapus proyek?')) return;
            projects = projects.filter(p=>p.id!==id);
            if(currentProjectId===id) currentProjectId = projects[0]?.id||null;
            saveData();
            render();
            closeProjectsModal();
            showToast('🗑 Dihapus');
        }

        function toggleExpand(pid) {
            const p = projects.find(x=>x.id===currentProjectId);
            p.steps[pid].expanded = !p.steps[pid].expanded;
            saveData();
            renderProject(p);
        }

        function triggerUpload(pid) { document.getElementById(`file-${pid}`).click(); }

        function handleFile(pid, input) {
            const f = input.files[0];
            if(!f) return;
            if(f.size>10*1024*1024) { showToast('❌ Max 10MB!'); return; }
            
            const p = projects.find(x=>x.id===currentProjectId);
            const r = new FileReader();
            r.onload = e => {
                p.steps[pid].files.push({name:f.name,type:f.type,size:f.size,data:e.target.result});
                saveData();
                renderProject(p);
                showToast('📎 File ditambah');
            };
            r.readAsDataURL(f);
            input.value='';
        }

        function deleteFile(pid, idx) {
            if(!confirm('Hapus file?')) return;
            const p = projects.find(x=>x.id===currentProjectId);
            p.steps[pid].files.splice(idx,1);
            saveData();
            renderProject(p);
            showToast('🗑 File dihapus');
        }

        function saveNote(pid, val) {
            const p = projects.find(x=>x.id===currentProjectId);
            p.steps[pid].note = val;
            saveData();
        }

        function setStatus(pid, status) {
            const p = projects.find(x=>x.id===currentProjectId);
            p.steps[pid].status = status;
            saveData();
            renderProject(p);
            showToast(status==='done'?'✅ Selesai!':'Status updated');
        }

        function openNewProjectModal() { document.getElementById('newProjectModal').classList.add('active'); }
        function closeNewProjectModal(e) { if(!e||e.target.id==='newProjectModal') document.getElementById('newProjectModal').classList.remove('active'); }
        
        function openEditProjectModal() {
            const p = projects.find(x=>x.id===currentProjectId);
            document.getElementById('editOrder').value = p.order;
            document.getElementById('editCustomer').value = p.customer;
            document.getElementById('editPanel').value = p.panel;
            document.getElementById('editProjectModal').classList.add('active');
        }
        function closeEditProjectModal(e) { if(!e||e.target.id==='editProjectModal') document.getElementById('editProjectModal').classList.remove('active'); }
        
        function saveEditProject() {
            const p = projects.find(x=>x.id===currentProjectId);
            p.order = document.getElementById('editOrder').value.trim();
            p.customer = document.getElementById('editCustomer').value.trim();
            p.panel = document.getElementById('editPanel').value.trim();
            saveData();
            render();
            closeEditProjectModal();
            showToast('💾 Tersimpan!');
        }

        function openProjectsModal() {
            document.getElementById('projectsList').innerHTML = projects.length?projects.map(p=>`
                <div class="project-list-item ${p.id===currentProjectId?'active':''}" onclick="selectAndClose('${p.id}')">
                    <div class="project-info-small">
                        <div class="project-name-small">${p.order}</div>
                        <div class="project-meta-small">${p.customer||'-'} • ${p.panel||'-'}</div>
                    </div>
                    <button class="delete-project-btn" onclick="deleteProject('${p.id}',event)">🗑</button>
                </div>`).join(''):'<p style="text-align:center;padding:40px;color:#888;">Belum ada proyek</p>';
            document.getElementById('projectsModal').classList.add('active');
        }
        function closeProjectsModal(e) { if(!e||e.target.id==='projectsModal') document.getElementById('projectsModal').classList.remove('active'); }
        function selectAndClose(id) { switchProject(id); closeProjectsModal(); }

        function viewImage(src) {
            document.getElementById('viewerImage').src = src;
            document.getElementById('imageViewer').classList.add('active');
        }
        function closeImageViewer() { document.getElementById('imageViewer').classList.remove('active'); }
        function viewPdf(data) { window.open(data,'_blank'); }

        function exportProject() {
            const p = projects.find(x=>x.id===currentProjectId);
            if(!p) return;
            const blob = new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${p.order.replace(/\s+/g,'_')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 Diekspor!');
        }

        function generatePDF() {
            const p = projects.find(x=>x.id===currentProjectId);
            if(!p) return;
            showToast('⏳ Membuat PDF...');
            
            const steps = Object.values(p.steps);
            const done = steps.filter(s=>s.status==='done').length;
            const pct = Math.round((done/PROCESSES.length)*100);

            document.getElementById('pdfBody').innerHTML = `
                <div style="margin-bottom:30px;padding:25px;background:#f8f9fa;border-radius:10px;">
                    <h3 style="margin-bottom:15px;">Info Proyek</h3>
                    <p><strong>Order:</strong> ${p.order}</p>
                    <p><strong>Pelanggan:</strong> ${p.customer||'-'}</p>
                    <p><strong>Panel:</strong> ${p.panel||'-'}</p>
                    <p><strong>Progress:</strong> ${pct}%</p>
                </div>
                ${PROCESSES.map(proc=>{
                    const s=p.steps[proc.id];
                    return `<div style="margin-bottom:20px;padding:20px;border:1px solid #ddd;border-radius:10px;background:#fafafa;">
                        <h4>${proc.icon} ${proc.id} - ${s.status.toUpperCase()}</h4>
                        <p>${proc.desc}</p>
                        ${s.note?`<p><em>Catatan: ${s.note}</em></p>`:''}
                        ${s.files.length?`<p>File: ${s.files.map(f=>f.name).join(', ')}</p>`:''}
                    </div>`;
                }).join('')}`;

            const el = document.getElementById('pdfContent');
            el.style.display='block';
            html2pdf().from(el).set({
                margin:10,
                filename:`Laporan_${p.order.replace(/\s+/g,'_')}.pdf`,
                html2canvas:{scale:2},
                jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
            }).save().then(()=>{
                el.style.display='none';
                showToast('📄 PDF didownload!');
            });
        }

        function showToast(msg) {
            const t=document.getElementById('toast');
            t.textContent=msg;
            t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),2500);
        }

        document.addEventListener('keydown', e=>{
            if(e.key==='Escape'){
                closeImageViewer();
                closeNewProjectModal();
                closeEditProjectModal();
                closeProjectsModal();
            }
        });
    </script>
</body>
</html>

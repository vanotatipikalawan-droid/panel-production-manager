<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🏭 Production Manager v11 - Fixed</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1a1a1a;
            --border-color: #2a2a2a; --text-primary: #ffffff; --text-secondary: #888888;
            --text-muted: #666666; --accent-blue: #3b82f6; --accent-green: #22c55e;
            --accent-red: #ef4444; --accent-yellow: #eab308; --accent-purple: #8b5cf6;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-tertiary: #f1f5f9;
            --border-color: #e2e8f0; --text-primary: #0f172a; --text-secondary: #475569;
            --text-muted: #94a3b8; --accent-blue: #2563eb; --accent-green: #16a34a;
            --accent-red: #dc2626; --accent-yellow: #ca8a04; --accent-purple: #7c3aed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
        
        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 1000; transform: translateX(-100%); transition: transform .3s; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .sidebar-logo { font-size: 2rem; margin-bottom: 8px; }
        .sidebar-title { font-size: 1.1rem; font-weight: 700; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: .75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 12px; margin-bottom: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer; transition: all .2s; color: var(--text-secondary); font-weight: 500; font-size: .95rem; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: rgba(59,130,246,.15); color: var(--accent-blue); }
        .nav-icon { font-size: 1.25rem; width: 24px; text-align: center; }
        
        .main-content { flex: 1; margin-left: 0; transition: margin-left .3s; width: 100%; }
        .main-content.sidebar-open { margin-left: 260px; }
        
        .top-header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-toggle { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem; }
        .header-title { font-size: 1.3rem; font-weight: 700; }
        
        .page { display: none; padding: 24px; min-height: calc(100vh - 80px); animation: fadeIn .3s; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        
        /* Dashboard Stats */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; transition: all .2s; }
        .stat-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-card-icon { font-size: 2.2rem; }
        .stat-card-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .stat-card-label { color: var(--text-secondary); font-size: .88rem; margin-top: 8px; }
        
        /* Panels & Steps */
        .card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 18px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 24px; }
        
        .project-item { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .project-item:hover { border-color: var(--accent-blue); transform: translateX(4px); }
        
        .panel-item { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
        .panel-header { padding: 18px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .panel-content { display: none; border-top: 1px solid var(--border-color); padding: 20px; background: rgba(255,255,255,.01); }
        .panel-item.expanded .panel-content { display: block; }
        
        .step-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .step-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; position: relative; }
        .step-card[data-status="done"] { border-left: 4px solid var(--accent-green); }
        .step-card[data-status="active"] { border-left: 4px solid var(--accent-blue); }

        /* Drop Zone */
        .detail-upload-zone { border: 2px dashed var(--border-color); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: 0.3s; }
        .detail-upload-zone.dragover { border-color: var(--accent-blue); background: rgba(59,130,246,0.1); }
        
        /* Photos */
        .file-thumbnails { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .file-thumb { width: 60px; height: 60px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; }
        .file-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Utilities */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-secondary); border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--border-color); padding: 24px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-tertiary); padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--accent-blue); margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }

        @media(max-width:768px) {
            .main-content.sidebar-open { margin-left: 0; }
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🏭</div>
            <div class="sidebar-title">ProdManager v11</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">Menu</div>
                <div class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
                <div class="nav-item" data-page="projects" onclick="navigateTo('projects')"><span class="nav-icon">📋</span> Projects</div>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Settings</div>
                <div class="nav-item" onclick="setTheme('dark')">🌙 Dark Mode</div>
                <div class="nav-item" onclick="setTheme('light')">☀️ Light Mode</div>
                <div class="nav-item" onclick="clearAllData()" style="color:var(--accent-red)">🗑 Reset Data</div>
            </div>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <header class="top-header">
            <div class="header-left">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h1 class="header-title" id="pageTitle">Dashboard</h1>
            </div>
        </header>

        <div class="page active" id="page-dashboard">
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-card-value" id="stat-total-projects">0</div>
                    <div class="stat-card-label">Total Projects</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="stat-total-panels">0</div>
                    <div class="stat-card-label">Total Panels</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="stat-completed-panels">0</div>
                    <div class="stat-card-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="stat-avg-progress">0%</div>
                    <div class="stat-card-label">Avg Progress</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">Performance Chart</span></div>
                <div class="card-body"><canvas id="dashboardChart" height="150"></canvas></div>
            </div>
        </div>

        <div class="page" id="page-projects">
            <div style="margin-bottom:20px; display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="openModal('newProjectModal')">+ Project Baru</button>
            </div>
            <div id="projectListContainer"></div>

            <div id="projectDetailCard" class="card" style="display:none; margin-top:24px;">
                <div class="card-header">
                    <h2 id="detailProjectTitle">Detail</h2>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-secondary" onclick="openModal('newPanelModal')">+ Panel</button>
                        <button class="btn btn-secondary" style="background:var(--accent-green); color:#fff" onclick="generatePDF()">📄 PDF</button>
                        <button class="btn btn-secondary" style="color:var(--accent-red)" onclick="deleteCurrentProject()">Hapus</button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="panelListContainer"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal-overlay" id="newProjectModal">
    <div class="modal">
        <h3>Proyek Baru</h3><br>
        <input type="text" id="newProjOrder" placeholder="No. Order (Contoh: PO-001)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-tertiary); color:#fff">
        <input type="text" id="newProjCustomer" placeholder="Nama Customer" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-tertiary); color:#fff">
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Batal</button>
            <button class="btn btn-primary" onclick="createNewProject()">Simpan</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="newPanelModal">
    <div class="modal">
        <h3>Tambah Panel</h3><br>
        <input type="text" id="panelNameInput" placeholder="Nama Panel (Contoh: MDP 1600A)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-tertiary); color:#fff">
        <input type="text" id="panelSpecInput" placeholder="Spesifikasi" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-tertiary); color:#fff">
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="btn btn-secondary" onclick="closeModal('newPanelModal')">Batal</button>
            <button class="btn btn-primary" onclick="createNewPanel()">Tambah</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== CONFIG & STATE ====================
const PROCESS_STEPS = [
    {id:'drawing', name:'Drawing', icon:'📐'},
    {id:'assembly', name:'Assembly', icon:'🔧'},
    {id:'wiring', name:'Wiring', icon:'🔌'},
    {id:'qc', name:'QC', icon:'✅'}
];

let state = {
    projects: [],
    currentProjectId: null,
    currentPanelId: null,
    db: null
};

// ==================== DB CORE (FIXED) ====================
const DB_NAME = 'ProdManagerDB_v11';
const DB_VERSION = 1;

function initDB() {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onsuccess = (e) => {
        state.db = e.target.result;
        loadProjects();
    };
    req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects', { keyPath: 'id' });
    };
}

function loadProjects() {
    const tx = state.db.transaction(['projects'], 'readonly');
    const store = tx.objectStore('projects');
    store.getAll().onsuccess = (e) => {
        state.projects = e.target.result || [];
        renderDashboard();
    };
}

function saveProject(p, cb) {
    const tx = state.db.transaction(['projects'], 'readwrite');
    tx.objectStore('projects').put(p);
    tx.oncomplete = () => {
        const idx = state.projects.findIndex(item => item.id === p.id);
        if(idx !== -1) state.projects[idx] = p; else state.projects.push(p);
        if(cb) cb();
        renderDashboard();
    };
}

// ==================== UI CORE ====================
function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`).classList.add('active');
    document.getElementById('pageTitle').innerText = page.charAt(0).toUpperCase() + page.slice(1);
    if(page === 'projects') renderProjectsList();
    if(window.innerWidth < 768) toggleSidebar();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('mainContent').classList.toggle('sidebar-open');
}

function renderDashboard() {
    let totalPanels = 0, donePanels = 0, totalProg = 0;
    state.projects.forEach(proj => {
        totalPanels += (proj.panels || []).length;
        (proj.panels || []).forEach(pan => {
            const prog = calculatePanelProgress(pan);
            totalProg += prog;
            if(prog === 100) donePanels++;
        });
    });

    document.getElementById('stat-total-projects').innerText = state.projects.length;
    document.getElementById('stat-total-panels').innerText = totalPanels;
    document.getElementById('stat-completed-panels').innerText = donePanels;
    document.getElementById('stat-avg-progress').innerText = totalPanels ? Math.round(totalProg/totalPanels) + '%' : '0%';
}

// ==================== PROJECT LOGIC ====================
function createNewProject() {
    const order = document.getElementById('newProjOrder').value;
    if(!order) return showToast('Isi No Order!', 'error');
    const proj = {
        id: 'p_' + Date.now(),
        order,
        customer: document.getElementById('newProjCustomer').value,
        panels: []
    };
    saveProject(proj, () => {
        closeModal('newProjectModal');
        renderProjectsList();
        showToast('Proyek Berhasil Dibuat');
    });
}

function renderProjectsList() {
    const container = document.getElementById('projectListContainer');
    container.innerHTML = state.projects.map(p => `
        <div class="project-item" onclick="selectProject('${p.id}')">
            <div>
                <strong>${p.order}</strong><br>
                <small>${p.customer || 'No Customer'}</small>
            </div>
            <div style="margin-left:auto">${(p.panels||[]).length} Panels</div>
        </div>
    `).join('');
}

function selectProject(id) {
    state.currentProjectId = id;
    const p = state.projects.find(i => i.id === id);
    document.getElementById('projectDetailCard').style.display = 'block';
    document.getElementById('detailProjectTitle').innerText = p.order;
    renderPanels();
}

// ==================== PANEL & STEPS LOGIC ====================
function createNewPanel() {
    const name = document.getElementById('panelNameInput').value;
    if(!name) return showToast('Isi Nama Panel!', 'error');
    
    const p = state.projects.find(i => i.id === state.currentProjectId);
    const newPanel = {
        id: 'pan_' + Date.now(),
        name,
        spec: document.getElementById('panelSpecInput').value,
        steps: {}
    };
    PROCESS_STEPS.forEach(s => {
        newPanel.steps[s.id] = { status: 'pending', note: '', files: [] };
    });
    
    p.panels.push(newPanel);
    saveProject(p, () => {
        closeModal('newPanelModal');
        renderPanels();
    });
}

function renderPanels() {
    const p = state.projects.find(i => i.id === state.currentProjectId);
    const container = document.getElementById('panelListContainer');
    container.innerHTML = (p.panels || []).map(pan => `
        <div class="panel-item ${state.currentPanelId === pan.id ? 'expanded' : ''}" id="pan-${pan.id}">
            <div class="panel-header" onclick="togglePanel('${pan.id}')">
                📦 <strong>${pan.name}</strong>
                <span style="margin-left:auto">${calculatePanelProgress(pan)}%</span>
            </div>
            <div class="panel-content">
                <div class="step-grid">
                    ${PROCESS_STEPS.map(s => renderStepCard(pan, s)).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function renderStepCard(panel, stepDef) {
    const step = panel.steps[stepDef.id];
    return `
        <div class="step-card" data-status="${step.status}">
            <strong>${stepDef.icon} ${stepDef.name}</strong>
            <div class="detail-upload-zone" 
                 ondragover="event.preventDefault(); this.classList.add('dragover')" 
                 ondragleave="this.classList.remove('dragover')"
                 ondrop="handleFileDrop(event, '${panel.id}', '${stepDef.id}')">
                <small>Drop foto di sini</small>
            </div>
            <div class="file-thumbnails">
                ${(step.files || []).map(f => `<img src="${f.data}" class="file-thumb" onclick="window.open('${f.data}')">`).join('')}
            </div>
            <div style="margin-top:10px; display:flex; gap:5px;">
                <button class="btn btn-secondary" style="font-size:10px" onclick="updateStepStatus('${panel.id}','${stepDef.id}','active')">Active</button>
                <button class="btn btn-primary" style="font-size:10px; background:var(--accent-green)" onclick="updateStepStatus('${panel.id}','${stepDef.id}','done')">Selesai</button>
            </div>
        </div>
    `;
}

function updateStepStatus(panelId, stepId, status) {
    const p = state.projects.find(i => i.id === state.currentProjectId);
    const pan = p.panels.find(i => i.id === panelId);
    pan.steps[stepId].status = status;
    saveProject(p, renderPanels);
}

// ==================== FILE HANDLING (FIXED) ====================
function handleFileDrop(e, panelId, stepId) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files);
    
    const p = state.projects.find(i => i.id === state.currentProjectId);
    const pan = p.panels.find(i => i.id === panelId);

    files.forEach(file => {
        if(!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            pan.steps[stepId].files.push({ data: event.target.result });
            saveProject(p, renderPanels);
        };
        reader.readAsDataURL(file);
    });
}

// ==================== UTILS ====================
function calculatePanelProgress(panel) {
    const steps = Object.values(panel.steps);
    const done = steps.filter(s => s.status === 'done').length;
    return Math.round((done / steps.length) * 100);
}

function togglePanel(id) {
    state.currentPanelId = state.currentPanelId === id ? null : id;
    renderPanels();
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showToast(msg, type='info') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
}

function clearAllData() {
    if(confirm('Hapus SEMUA data proyek?')) {
        const tx = state.db.transaction(['projects'], 'readwrite');
        tx.objectStore('projects').clear();
        tx.oncomplete = () => location.reload();
    }
}

// ==================== PDF REPORT (Schneider Style) ====================
function generatePDF() {
    const p = state.projects.find(i => i.id === state.currentProjectId);
    const element = document.createElement('div');
    element.style.padding = '40px';
    element.style.color = '#000';
    element.style.background = '#fff';
    
    element.innerHTML = `
        <h1 style="color:#009e4d">PRODUCTION REPORT</h1>
        <hr>
        <p>Order: ${p.order}</p>
        <p>Customer: ${p.customer || '-'}</p>
        <br>
        <table border="1" style="width:100%; border-collapse:collapse">
            <tr style="background:#eee"><th>Panel</th><th>Progress</th></tr>
            ${p.panels.map(pan => `<tr><td>${pan.name}</td><td>${calculatePanelProgress(pan)}%</td></tr>`).join('')}
        </table>
    `;

    html2pdf().from(element).set({
        margin: 10,
        filename: `Report_${p.order}.pdf`,
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save();
}

// Init on Load
window.onload = () => {
    initDB();
    if(localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
};
</script>

</body>
</html>

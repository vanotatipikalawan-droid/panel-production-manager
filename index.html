<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 Production Manager v12 - COMPLETE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --bg-input: #1e1e1e;
            --border-color: #2a2a2a;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --blue: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --purple: #8b5cf6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .app-layout { display: flex; min-height: 100vh; }
        
        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .sidebar-header { padding: 24px; border-bottom: 2px solid var(--border-color); text-align: center; }
        .logo { font-size: 3rem; }
        .app-title { font-size: 1.1rem; font-weight: 800; }
        .nav-menu { flex: 1; padding: 20px 16px; overflow-y: auto; }
        .nav-item {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: transparent;
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-gray);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(59,130,246,0.1); border-color: var(--blue); color: var(--text-white); transform: translateX(4px); }
        .nav-item.active { background: rgba(59,130,246,0.15); border-color: var(--blue); color: var(--blue); font-weight: 700; }
        .badge { float: right; background: var(--red); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .sidebar-footer { padding: 20px; border-top: 2px solid var(--border-color); text-align: center; font-size: 0.85rem; color: var(--text-gray); }
        
        /* MAIN */
        .main-content { flex: 1; margin-left: 260px; transition: margin-left 0.3s; min-height: 100vh; }
        .main-content.full { margin-left: 0; }
        
        .header {
            background: var(--bg-card);
            border-bottom: 2px solid var(--border-color);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0; z-index: 50;
        }
        .menu-btn {
            width: 46px; height: 46px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 1.4rem;
            cursor: pointer;
        }
        .menu-btn:hover { background: var(--blue); border-color: var(--blue); }
        .page-title { font-size: 1.4rem; font-weight: 800; }
        
        /* PAGES */
        .page { display: none; padding: 32px; animation: fadeIn 0.3s; }
        .page.active { display: block !important; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        
        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn-primary { background: linear-gradient(135deg, var(--blue), #2563eb); color: white; }
        .btn-success { background: linear-gradient(135deg, var(--green), #16a34a); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--red), #dc2626); color: white; }
        .btn-secondary { background: var(--bg-input); color: var(--text-white); border: 2px solid var(--border-color); }
        .btn-sm { padding: 10px 18px; font-size: 0.9rem; }
        
        /* CARDS */
        .card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 16px; margin-bottom: 24px; overflow: hidden; }
        .card-header { padding: 20px 24px; border-bottom: 2px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 1.15rem; font-weight: 800; }
        .card-body { padding: 24px; }
        
        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: 900; }
        .stat-label { color: var(--text-gray); font-size: 0.9rem; margin-top: 8px; text-transform: uppercase; }
        
        /* PROJECT LIST */
        .project-list { display: flex; flex-direction: column; gap: 16px; }
        .project-card {
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .project-card:hover { border-color: var(--blue); transform: translateX(8px); }
        .project-icon { font-size: 3rem; }
        .project-info { flex: 1; }
        .project-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; }
        .project-meta { color: var(--text-gray); font-size: 0.95rem; }
        
        /* PANEL DETAIL */
        .panel-detail { margin-top: 32px; border: 2px solid var(--purple); border-radius: 16px; overflow: hidden; }
        .panel-detail-header {
            background: linear-gradient(135deg, rgba(139,92,246,0.2), transparent);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }
        .panel-detail-title { font-size: 1.4rem; font-weight: 800; color: var(--purple); }
        .panel-stats { display: flex; gap: 20px; }
        .panel-stat { text-align: center; }
        .panel-stat-value { font-size: 1.5rem; font-weight: 900; color: var(--purple); }
        .panel-stat-label { font-size: 0.85rem; color: var(--text-gray); }
        
        /* STEPS GRID */
        .steps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 24px; }
        
        /* STEP CARD */
        .step-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
        }
        .step-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--border-color);
        }
        .step-card[data-status="active"]::before { background: var(--blue); }
        .step-card[data-status="done"]::before { background: var(--green); }
        .step-card:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        
        .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; cursor: pointer; }
        .step-icon { font-size: 1.8rem; }
        .step-name { flex: 1; font-weight: 700; font-size: 1.05rem; }
        .step-status-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--text-gray);
        }
        .step-status-dot.active { background: var(--blue); animation: pulse 2s infinite; }
        .step-status-dot.done { background: var(--green); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        
        /* STEP NOTE */
        .step-note-area { margin: 14px 0; }
        .step-note-label { font-size: 0.85rem; color: var(--text-gray); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
        .step-note-textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            font-size: 0.9rem;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
        }
        .step-note-textarea:focus { outline: none; border-color: var(--yellow); }
        
        /* FILE UPLOAD AREA */
        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            margin: 14px 0;
        }
        .file-upload-area:hover, .file-upload-area.dragover {
            border-color: var(--blue);
            background: rgba(59,130,246,0.05);
        }
        .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .upload-text { font-weight: 600; margin-bottom: 4px; }
        .upload-hint { font-size: 0.85rem; color: var(--text-gray); }
        
        /* FILE THUMBNAILS */
        .files-container { margin: 14px 0; }
        .files-label { font-size: 0.85rem; color: var(--text-gray); font-weight: 700; margin-bottom: 10px; }
        .files-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .file-item {
            width: 80px; height: 80px;
            border-radius: 10px;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-item:hover { border-color: var(--blue); transform: scale(1.08); z-index: 10; }
        .file-item img { width: 100%; height: 100%; object-fit: cover; }
        .file-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            background: var(--bg-input);
        }
        
        /* DELETE BUTTON ON FILE */
        .file-delete-btn {
            position: absolute;
            top: 3px; right: 3px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--red);
            color: white;
            border: none;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .file-item:hover .file-delete-btn { opacity: 1; }
        .file-delete-btn:hover { background: #dc2626; transform: scale(1.15); }
        
        /* CAPTION INPUT */
        .file-caption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9);
            color: white;
            font-size: 0.7rem;
            padding: 3px 6px;
            border: none;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .file-item:hover .file-caption { opacity: 1; }
        .file-caption:focus { outline: none; background: var(--blue); }
        
        /* ADD FILE BUTTON */
        .add-file-btn {
            width: 80px; height: 80px;
            border-radius: 10px;
            border: 2px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--text-gray);
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
        }
        .add-file-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,0.1); }
        
        /* STEP ACTIONS */
        .step-actions { display: flex; gap: 8px; margin-top: 16px; }
        .step-action-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-gray);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .step-action-btn:hover { border-color: var(--blue); color: var(--blue); }
        .step-action-btn.active-status { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.15); }
        
        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-overlay.show { display: flex !important; animation: fadeIn 0.2s; }
        .modal {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 10000;
            position: relative;
        }
        .modal-header { padding: 24px; border-bottom: 2px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.2rem; font-weight: 800; }
        .close-btn {
            width: 40px; height: 40px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-gray);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close-btn:hover { background: var(--red); color: white; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 20px 24px; border-top: 2px solid var(--border-color); display: flex; gap: 12px; justify-content: flex-end; }
        
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-gray); margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 14px 18px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            font-size: 1rem;
        }
        .form-input:focus { outline: none; border-color: var(--blue); }
        
        /* TOAST */
        .toast-container { position: fixed; top: 100px; right: 24px; z-index: 99999; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-left: 5px solid var(--blue);
            color: var(--text-white);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            min-width: 300px;
            max-width: 450px;
            animation: slideInRight 0.3s;
            cursor: pointer;
        }
        .toast.success { border-left-color: var(--green); }
        .toast.error { border-left-color: var(--red); }
        @keyframes slideInRight { from{transform:translateX(120%)} to{transform:translateX(0)} }
        
        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-gray); }
        .empty-icon { font-size: 5rem; margin-bottom: 20px; opacity: 0.4; }
        .empty-title { font-size: 1.4rem; font-weight: 800; color: var(--text-white); margin-bottom: 12px; }
        
        @media(max-width:768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .steps-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">🏭</div>
            <div class="app-title">Production Manager</div>
        </div>
        <nav class="nav-menu">
            <button class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</button>
            <button class="nav-item" onclick="showPage('projects')">📋 Projects <span class="badge" id="projectBadge">0</span></button>
            <button class="nav-item" onclick="generatePDF()">📄 Export PDF</button>
        </nav>
        <div class="sidebar-footer">v12 Complete</div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">
        <header class="header">
            <div style="display:flex;align-items:center;gap:16px;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
        </header>

        <!-- DASHBOARD PAGE -->
        <div class="page active" id="dashboardPage">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalProjects">0</div><div class="stat-label">Projects</div></div>
                <div class="stat-card"><div class="stat-value" id="totalPanels">0</div><div class="stat-label">Panels</div></div>
                <div class="stat-card"><div class="stat-value" id="completedPanels">0</div><div class="stat-label">Completed</div></div>
                <div class="stat-card"><div class="stat-value" id="avgProgress">0%</div><div class="stat-label">Progress</div></div>
            </div>
            
            <div class="card">
                <div class="card-header"><span class="card-title">⚡ Quick Actions</span></div>
                <div class="card-body">
                    <p style="color:var(--text-gray);margin-bottom:20px;">Create sample data or start new project:</p>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="createSampleData()">➕ Create Sample Data</button>
                        <button class="btn btn-success" onclick="generatePDF()">📄 Generate PDF</button>
                        <button class="btn btn-danger" onclick="clearAllData()">🗑 Clear Data</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PROJECTS PAGE -->
        <div class="page" id="projectsPage">
            <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="openModal('newProjectModal')">+ New Project</button>
                <button class="btn btn-success" onclick="generatePDF()">📄 Export PDF</button>
            </div>
            
            <div class="project-list" id="projectListContainer"></div>
            
            <!-- PANEL DETAIL SECTION -->
            <div class="panel-detail" id="panelDetailSection" style="display:none;">
                <div class="panel-detail-header">
                    <div>
                        <div class="panel-detail-title" id="detailPanelName">Panel Name</div>
                        <div style="color:var(--text-gray);margin-top:4px;" id="detailPanelSpec">Specification</div>
                    </div>
                    <div class="panel-stats">
                        <div class="panel-stat"><div class="panel-stat-value" id="detailProgress">0%</div><div class="panel-stat-label">Progress</div></div>
                        <div class="panel-stat"><div class="panel-stat-value" id="detailFiles">0</div><div class="panel-stat-label">Files</div></div>
                    </div>
                </div>
                
                <div class="steps-grid" id="stepsGridContainer"></div>
            </div>
        </div>
    </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="newProjectModal">
    <div class="modal">
        <div class="modal-header"><span class="modal-title">➕ New Project</span><button class="close-btn" onclick="closeModal('newProjectModal')">×</button></div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Order Number *</label><input type="text" class="form-input" id="inputOrder" placeholder="PO-2024-001"></div>
            <div class="form-group"><label class="form-label">Customer</label><input type="text" class="form-input" id="inputCustomer" placeholder="PT. Example"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea class="form-input" id="inputDesc" rows="3" placeholder="Description..."></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveNewProject()">Create</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="imageViewerModal">
    <div style="position:relative;width:100%;max-width:90vw;">
        <button class="close-btn" style="position:absolute;top:-45px;right:0;" onclick="closeModal('imageViewerModal')">×</button>
        <img id="viewerImage" src="" style="width:100%;max-height:85vh;object-fit:contain;border-radius:12px;">
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== CONSTANTS ====================
const PROCESS_STEPS = [
    {id:'drawing', name:'Drawing / Gambar', icon:'📐'},
    {id:'preparation', name:'Preparation / Persiapan', icon:'📦'},
    {id:'assembly', name:'Assembly / Perakitan', icon:'🔧'},
    {id:'wiring', name:'Wiring / Kabel', icon:'🔌'},
    {id:'finishing', name:'Finishing / Finishing', icon:'✨'},
    {id:'qc', name:'Quality Control / QC', icon:'✅'}
];

// ==================== STATE ====================
let appState = {
    projects: [],
    selectedProjectId: null,
    selectedPanelId: null,
    db: null
};

const DB_NAME = 'ProdManagerDB_Complete';
let DB;

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
    initDB();
});

function initDB() {
    const request = indexedDB.open(DB_NAME, 1);
    request.onerror = () => showToast('DB Error!', 'error');
    request.onsuccess = (e) => {
        DB = e.target.result;
        loadProjects();
    };
    request.onupgradeneeded = (e) => {
        if (!e.target.result.objectStoreNames.contains('projects')) {
            e.target.result.createObjectStore('projects', { keyPath: 'id' });
        }
    };
}

function loadProjects() {
    if (!DB) return;
    const tx = DB.transaction(['projects'], 'readonly');
    tx.objectStore('projects').getAll().onsuccess = (e) => {
        appState.projects = e.target.result || [];
        updateUI();
    };
}

function saveProject(proj, cb) {
    if (!DB) return;
    const tx = DB.transaction(['projects'], 'readwrite');
    tx.objectStore('projects').put(proj);
    tx.oncomplete = cb || (()=>{});
}

// ==================== NAVIGATION ====================
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'Page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`.nav-item[onclick*="${page}"]`)?.classList.add('active');
    document.getElementById('pageTitle').textContent = page === 'dashboard' ? '📊 Dashboard' : '📋 Projects';
    updateUI();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('mainContent').classList.toggle('full');
}

// ==================== UI UPDATE ====================
function updateUI() {
    let tProj = appState.projects.length, tPan = 0, comp = 0, totProg = 0;
    appState.projects.forEach(p => {
        (p.panels||[]).forEach(pa => {
            tPan++;
            let pr = calcPanelProgress(pa);
            totProg += pr;
            if(pr === 100) comp++;
        });
    });
    document.getElementById('totalProjects').textContent = tProj;
    document.getElementById('totalPanels').textContent = tPan;
    document.getElementById('completedPanels').textContent = comp;
    document.getElementById('avgProgress').textContent = tPan ? Math.round(totProg/tPan)+'%' : '0%';
    document.getElementById('projectBadge').textContent = tProj;
    renderProjectList();
}

function renderProjectList() {
    const container = document.getElementById('projectListContainer');
    if (!appState.projects.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No Projects</div><button class="btn btn-primary" style="margin-top:20px;" onclick="createSampleData()">➕ Create Sample</button></div>`;
        return;
    }
    container.innerHTML = appState.projects.map(p => {
        const prog = calcProjectProgress(p);
        return `<div class="project-card" onclick="selectProject('${p.id}')">
            <div class="project-icon">📋</div>
            <div class="project-info">
                <div class="project-name">${esc(p.order)}</div>
                <div class="project-meta">${esc(p.customer||'-')} • ${(p.panels||[]).length} panels</div>
            </div>
            <div style="font-size:1.8rem;font-weight:900;color:${prog===100?'var(--green)':'var(--blue)'};">${prog}%</div>
        </div>`;
    }).join('');
}

function selectProject(pid) {
    appState.selectedProjectId = pid;
    showPage('projects');
    document.getElementById('panelDetailSection').style.display = 'none';
}

// ==================== PANEL DETAIL WITH STEPS ====================
function showPanelDetail(panelId) {
    appState.selectedPanelId = panelId;
    const proj = appState.projects.find(p => p.id === appState.selectedProjectId);
    const panel = proj?.panels?.find(p => p.id === panelId);
    if (!panel) return;
    
    document.getElementById('detailPanelName').textContent = panel.name;
    document.getElementById('detailPanelSpec').textContent = panel.spec || '-';
    document.getElementById('detailProgress').textContent = calcPanelProgress(panel) + '%';
    
    // Count total files
    let totalFiles = 0;
    Object.values(panel.steps||{}).forEach(s => totalFiles += (s.files||[]).length);
    document.getElementById('detailFiles').textContent = totalFiles;
    
    document.getElementById('panelDetailSection').style.display = 'block';
    document.getElementById('panelDetailSection').scrollIntoView({behavior:'smooth'});
    
    renderSteps(panel);
}

function renderSteps(panel) {
    const container = document.getElementById('stepsGridContainer');
    container.innerHTML = PROCESS_STEPS.map(stepDef => {
        const step = panel.steps?.[stepDef.id] || {status:'pending', files:[], note:''};
        const files = step.files || [];
        const fileCount = files.length;
        
        return `
        <div class="step-card" data-status="${step.status}" id="step-${panel.id}-${stepDef.id}">
            <div class="step-header" onclick="toggleStepExpand('${panel.id}','${stepDef.id}')">
                <span class="step-icon">${stepDef.icon}</span>
                <span class="step-name">${stepDef.name}</span>
                <div class="step-status-dot ${step.status}"></div>
            </div>
            
            <!-- NOTE AREA -->
            <div class="step-note-area">
                <div class="step-note-label">📝 Catatan / Notes</div>
                <textarea class="step-note-textarea" 
                          placeholder="Tambah catatan untuk step ini..."
                          onblur="saveStepNote('${panel.id}','${stepDef.id}',this.value)">${esc(step.note)}</textarea>
            </div>
            
            <!-- FILES AREA -->
            <div class="files-container">
                <div class="files-label">📎 Files/Foto (${fileCount})</div>
                <div class="files-grid">
                    ${files.map((f, idx) => `
                    <div class="file-item" title="${esc(f.caption||f.name)}">
                        ${f.type?.startsWith('image/') ? 
                            `<img src="${f.data}" loading="lazy" onclick="viewImage('${f.data}')">` :
                            `<div class="file-placeholder" onclick="viewImage('${f.data}')">${getFileIcon(f.type)}</div>`
                        }
                        <button class="file-delete-btn" onclick="event.stopPropagation();deleteFile('${panel.id}','${stepDef.id}','${f.id}')">×</button>
                        <input type="text" class="file-caption" 
                               placeholder="Keterangan..."
                               value="${esc(f.caption||'')}"
                               onclick="event.stopPropagation()"
                               onchange="saveCaption('${panel.id}','${stepDef.id}','${f.id}',this.value)">
                    </div>
                    `).join('')}
                    
                    <div class="add-file-btn" onclick="triggerUpload('${panel.id}','${stepDef.id}')">+</div>
                </div>
            </div>
            
            <!-- UPLOAD ZONE -->
            <div class="file-upload-area"
                 onclick="triggerUpload('${panel.id}','${stepDef.id}')"
                 ondragover="e=>{e.preventDefault();this.classList.add('dragover')}"
                 ondragleave="e=>{e.preventDefault();this.classList.remove('dragover')}"
                 ondrop="e=>{e.preventDefault();this.classList.remove('dragover');handleDrop(e,'${panel.id}','${stepDef.id}')}">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Klik atau drag file ke sini</div>
                <div class="upload-hint">Foto, PDF, Word, Excel (Max 10MB)</div>
            </div>
            
            <input type="file" id="file-${panel.id}-${stepDef.id}" 
                   style="display:none"
                   accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
                   multiple
                   onchange="handleFiles('${panel.id}','${stepDef.id}',this)">
            
            <!-- ACTIONS -->
            <div class="step-actions">
                <button class="step-action-btn ${step.status==='done'?'active-status':''}" 
                        onclick="setStepStatus('${panel.id}','${stepDef.id}','done')"
                        ${fileCount===0?'title="Upload file dulu!"':''}>
                    ✅ Selesai
                </button>
                <button class="step-action-btn" 
                        onclick="setStepStatus('${panel.id}','${stepDef.id}','active')">
                    ▶ Proses
                </button>
            </div>
        </div>
        `;
    }).join('');
}

function toggleStepExpand(pid, sid) {
    // Could expand/collapse step details
    console.log('Toggle step:', pid, sid);
}

// ==================== STEP ACTIONS ====================
function saveStepNote(pid, sid, note) {
    const proj = getProject();
    const panel = proj?.panels?.find(p => p.id === pid);
    if (panel?.steps?.[sid]) {
        panel.steps[sid].note = note;
        saveProject(proj);
        showToast('💾 Catatan disimpan!', 'success');
    }
}

function setStepStatus(pid, sid, status) {
    const proj = getProject();
    const panel = proj?.panels?.find(p => p.id === pid);
    const step = panel?.steps?.[sid];
    
    if (status === 'done' && (!step?.files?.length)) {
        showToast('⚠️ Upload minimal 1 file sebelum mark Selesai!', 'warning');
        return;
    }
    
    if (step) {
        step.status = status;
        saveProject(proj, () => {
            showPanelDetail(pid);
            showToast(`Status: ${status.toUpperCase()} ✅`, 'success');
        });
    }
}

// ==================== FILE OPERATIONS ====================
function triggerUpload(pid, sid) {
    document.getElementById(`file-${pid}-${sid}`).click();
}

function handleFiles(pid, sid, input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    
    const proj = getProject();
    const panel = proj?.panels?.find(p => p.id === pid);
    if (!panel) return;
    
    let processed = 0;
    showToast(`📤 Mengupload ${files.length} file...`, 'info');
    
    files.forEach(file => {
        if (file.size > 10*1024*1024) {
            showToast(`${file.name} terlalu besar!`, 'error');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const fileData = {
                id: 'f_'+Date.now()+Math.random().toString(36).substr(2,9),
                name: file.name,
                type: file.type,
                size: file.size,
                data: e.target.result,
                caption: '',
                uploadedAt: new Date().toISOString()
            };
            
            if (!panel.steps[sid].files) panel.steps[sid].files = [];
            panel.steps[sid].files.push(fileData);
            
            if (++processed === files.length) {
                saveProject(proj, () => {
                    showPanelDetail(pid);
                    showToast(`✅ ${processed} file berhasil diupload!`, 'success');
                });
            }
        };
        reader.readAsDataURL(file);
    });
}

function handleDrop(e, pid, sid) {
    e.preventDefault();
    const dt = new DataTransfer();
    if (e.dataTransfer.items) {
        Array.from(e.dataTransfer.items).forEach(item => {
            if (item.kind === 'file') dt.items.add(item.getAsFile());
        });
    }
    if (dt.files.length) {
        const input = document.getElementById(`file-${pid}-${sid}`);
        input.files = dt.files;
        handleFiles(pid, sid, input);
    }
}

function saveCaption(pid, sid, fid, caption) {
    const proj = getProject();
    const panel = proj?.panels?.find(p => p.id === pid);
    const file = panel?.steps?.[sid]?.files?.find(f => f.id === fid);
    if (file) {
        file.caption = caption;
        saveProject(proj);
        showToast('💬 Keterangan disimpan!', 'success');
    }
}

function deleteFile(pid, sid, fid) {
    if (!confirm('Hapus file ini?')) return;
    
    const proj = getProject();
    const panel = proj?.panels?.find(p => p.id === pid);
    if (panel?.steps?.[sid]) {
        const orig = panel.steps[sid].files.length;
        panel.steps[sid].files = panel.steps[sid].files.filter(f => f.id !== fid);
        
        saveProject(proj, () => {
            showPanelDetail(pid);
            showToast(`🗑 File dihapus (${orig-1} tersisa)`, 'info');
        });
    }
}

function viewImage(src) {
    document.getElementById('viewerImage').src = src;
    openModal('imageViewerModal');
}

// ==================== PROJECT CRUD ====================
function createSampleData() {
    const proj = {
        id: 'proj_'+Date.now(),
        order: 'PO-SAMPLE-'+Math.floor(Math.random()*1000),
        customer: 'PT. Test Company',
        description: 'Sample project with complete features',
        createdAt: new Date().toISOString(),
        panels: [{
            id: 'panel_1',
            name: 'MDP Main Distribution Panel',
            spec: '3 Phase, 400V, 2500A',
            quantity: 2,
            steps: {}
        }]
    };
    
    // Initialize all steps
    PROCESS_STEPS.forEach(s => {
        proj.panels[0].steps[s.id] = { status: 'pending', files: [], note: '' };
    });
    
    saveProject(proj, () => {
        appState.projects.push(proj);
        updateUI();
        showToast('✅ Sample data created!', 'success');
        showPage('projects');
    });
}

function saveNewProject() {
    const order = document.getElementById('inputOrder').value.trim();
    if (!order) { showToast('Order number required!', 'warning'); return; }
    
    const proj = {
        id: 'proj_'+Date.now(),
        order,
        customer: document.getElementById('inputCustomer').value.trim(),
        description: document.getElementById('inputDesc').value.trim(),
        createdAt: new Date().toISOString(),
        panels: []
    };
    
    saveProject(proj, () => {
        appState.projects.push(proj);
        closeModal('newProjectModal');
        updateUI();
        showToast(`✅ Project "${order}" created!`, 'success');
        ['inputOrder','inputCustomer','inputDesc'].forEach(id => document.getElementById(id).value = '');
    });
}

function clearAllData() {
    if(!confirm('Hapus semua data?'))return;
    if(DB){DB.transaction(['projects'],'readwrite').objectStore('pages').clear();}
    appState.projects=[];
    updateUI();
    showToast('🗑 Data dihapus!', 'warning');
}

function getProject() { return appState.projects.find(p => p.id === appState.selectedProjectId); }

// ==================== PROGRESS CALC ====================
function calcPanelProgress(panel) {
    if (!panel?.steps) return 0;
    const steps = Object.values(panel.steps);
    if (!steps.length) return 0;
    return Math.round((steps.filter(s => s.status==='done').length/steps.length)*100);
}

function calcProjectProgress(proj) {
    if (!proj?.panels?.length) return 0;
    return Math.round(proj.panels.reduce((s,p)=>s+calcPanelProgress(p),0)/proj.panels.length);
}

    const proj = appState.projects[0];
    
    const printWindow = window.open('','');
    printWindow.document.write(`

.badge{padding:3pt 10pt;border-radius:12pt;font-size:9pt;font-weight:bold;text-transform:uppercase;}
.badge-pending{background:#f1f5f9;color:#64748b;}
.badge-active{background:#dbeafe;color:#2563eb;}
.badge-done{background:#dcfce7;color:#16a34a;}
.sig-area{margin-top:50pt;display:flex;justify-content:space-around;}

</div>

<h2>📋 Panel Summary</h2>
<table>

PROCESS_STEPS.forEach(sd=>{

if(st&&(st.status!=='pending'||st.note||(st.files&&st.files.length>0))){

// ==================== UTILITIES ====================
function esc(str){if(!str)return '';const d=document.createElement('div');d.textContent=str;return d.innerHTML;}
function getFileIcon(t){if(!t)return'📎';if(t.includes('pdf'))return'📄';if(t.includes('word'))return'📝';if(t.includes('excel')||t.includes('sheet'))return'📊';if(t.includes('image'))return'🖼️';return'📎';}

// ==================== MODALS ====================
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

document.querySelectorAll('.modal-overlay').forEach(m=>{
    m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');});
});

// ==================== TOAST ====================
function showToast(msg,type){
    const c=document.getElementById('toastContainer');
    const t=document.createElement('div');
    t.className=`toast ${type||'info'}`;
    t.innerHTML=msg;
    t.onclick=()=>{t.style.animation='slideInRight .3s reverse';setTimeout(()=>t.remove(),300);};
    c.appendChild(t);
    setTimeout(()=>{if(t.parentNode){t.style.animation='slideInRight .3s reverse';setTimeout(()=>t.remove(),300);}},4000);
}

// Keyboard
document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
        document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));
    }
});

console.log('%c✅ All features: Steps, Files, Notes, Captions, Delete, PDF','color:#3b82f6;font-size:14px;');

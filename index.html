<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Manager V15 (Full Power)</title>
<style>
body{font-family:sans-serif;background:#0a0a0a;color:#fff;margin:0}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin:12px}
.btn{padding:8px 12px;border:none;border-radius:6px;background:#3b82f6;color:#fff;cursor:pointer}
.step{border:1px solid #2a2a2a;padding:10px;margin:8px 0;border-radius:8px}
.files{display:flex;gap:6px;overflow-x:auto}
.file{width:60px;height:60px;border:1px solid #333}
.file img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>

<div class="card">
<button class="btn" onclick="createSample()">Create Sample</button>
<button class="btn" onclick="clearDB()">Clear DB</button>
<div id="app"></div>
</div>

<script>

// ================= DATABASE =================
const DB_NAME='V15_DB';
let db;

function initDB(){
 const req=indexedDB.open(DB_NAME,1);
 req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore('projects',{keyPath:'id'});
 };
 req.onsuccess=e=>{
  db=e.target.result;
  load();
 };
}

function saveDB(data){
 const tx=db.transaction(['projects'],'readwrite');
 tx.objectStore('projects').put(data);
}

function load(){
 const tx=db.transaction(['projects'],'readonly');
 const req=tx.objectStore('projects').getAll();
 req.onsuccess=e=>{
  AppState.projects=e.target.result||[];
  render();
 };
}

function clearDB(){
 const tx=db.transaction(['projects'],'readwrite');
 tx.objectStore('projects').clear();
 AppState.projects=[];
 render();
}

// ================= STATE =================
const AppState={projects:[]};

// ================= HELPERS =================
function debounce(fn,d=400){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d)}}

// ================= RENDER =================
function render(){
 const root=document.getElementById('app');root.innerHTML='';

 AppState.projects.forEach(p=>{
  const card=document.createElement('div');card.className='card';
  card.innerHTML=`<h3>${p.order}</h3>`;

  p.panels.forEach(panel=>{
   const wrap=document.createElement('div');

   Object.keys(panel.steps).forEach(stepId=>{
    const step=panel.steps[stepId];

    const div=document.createElement('div');
    div.className='step';
    div.id=`step-${panel.id}-${stepId}`;

    div.innerHTML=`
      <div><b>${stepId}</b> - <span>${step.status}</span></div>
      <textarea oninput="saveNote('${p.id}','${panel.id}','${stepId}',this.value)">${step.note}</textarea>
      <div class="files" id="files-${panel.id}-${stepId}"></div>
      <button onclick="upload('${p.id}','${panel.id}','${stepId}')">+</button>
      <button onclick="setStatus('${p.id}','${panel.id}','${stepId}','done')">Done</button>
    `;

    wrap.appendChild(div);
    renderFiles(panel.id,stepId,step.files);
   });

   card.appendChild(wrap);
  });

  root.appendChild(card);
 });
}

// ================= FILE RENDER =================
function renderFiles(panelId,stepId,files){
 const el=document.getElementById(`files-${panelId}-${stepId}`);
 if(!el)return;
 el.innerHTML='';

 const max=10;
 files.slice(0,max).forEach(f=>{
  const d=document.createElement('div');d.className='file';
  d.innerHTML=`<img src="${f.url}" loading="lazy">`;
  el.appendChild(d);
 });

 if(files.length>max){
  const more=document.createElement('div');
  more.textContent=`+${files.length-max}`;
  el.appendChild(more);
 }
}

// ================= ACTION =================
function setStatus(pid,panid,stepId,status){
 const p=AppState.projects.find(x=>x.id===pid);
 const pan=p.panels.find(x=>x.id===panid);
 pan.steps[stepId].status=status;
 saveDB(p);
 render();
}

const saveNote=debounce((pid,panid,stepId,val)=>{
 const p=AppState.projects.find(x=>x.id===pid);
 const pan=p.panels.find(x=>x.id===panid);
 pan.steps[stepId].note=val;
 saveDB(p);
},400);

// ================= UPLOAD =================
function upload(pid,panid,stepId){
 const input=document.createElement('input');
 input.type='file';input.multiple=true;

 input.onchange=e=>{
  const files=[...e.target.files];
  const p=AppState.projects.find(x=>x.id===pid);
  const pan=p.panels.find(x=>x.id===panid);

  files.forEach(f=>{
    const url=URL.createObjectURL(f);
    pan.steps[stepId].files.push({
      id:Date.now()+Math.random(),
      url:url,
      blob:f
    });
  });

  saveDB(p);
  renderFiles(panid,stepId,pan.steps[stepId].files);
 };
 input.click();
}

// ================= SAMPLE =================
function createSample(){
 const proj={
  id:'p1',
  order:'PO-V15',
  panels:[{
    id:'pan1',
    steps:{
      drawing:{status:'pending',files:[],note:''},
      wiring:{status:'pending',files:[],note:''}
    }
  }]
 };

 AppState.projects=[proj];
 saveDB(proj);
 render();
}

// INIT
initDB();

</script>
</body>
</html>
